        <div style="display:flex;flex-direction:column;gap:13px">
          <div><label class="slbl" style="display:block;margin-bottom:7px">Torneio</label><input type="text" id="cr-torn" value="${nova.torneio}" placeholder="Ex: US Open - QF" style="font-size:13px"></div>
          <div><label class="slbl" style="display:block;margin-bottom:7px">Data</label><input type="date" id="cr-data" value="${nova.data}" style="font-size:13px"></div>
          <div><label class="slbl" style="display:block;margin-bottom:7px">Desfecho</label>
            <select id="cr-res" style="font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700"><option value="Vitória">● Vitória</option><option value="Derrota">❌ Derrota</option></select>
          </div>
          <div><label class="slbl" style="display:block;margin-bottom:7px">Confiança (1-10)</label><input type="number" min="1" max="10" id="cr-conf" value="${nova.confianca}" style="font-size:13px;font-family:'DM Mono',sans-serif"></div>
          <button class="btn-y" id="cr-save" ${salv ? "disabled" : ""}>${salv ? "Computando..." : "Gravar Partida"}</button>
        </div>
      </div>
      <div class="glass" style="border-radius:18px;padding:24px;display:flex;flex-direction:column;max-height:680px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;flex-shrink:0">
          ${[["Total", partidas.length, "#e2e8f0"], ["Vitórias", partidas.filter(p => p.resultado === "Vitória").length, "#4ade80"], ["Derrotas", partidas.filter(p => p.resultado === "Derrota").length, "#f87171"]].map(([l, v, col]) => `<div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:14px 10px;text-align:center"><span class="slbl" style="display:block;margin-bottom:5px">${l}</span><strong style="font-family:'DM Mono',sans-serif;font-size:36px;color:${col};line-height:1">${v}</strong></div>`).join("")}
        </div>
        <div class="cs" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:11px">
          ${partidas.map(p => `<div style="background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.05);border-radius:15px;padding:16px">
            <div style="display:flex;align-items:center;gap:11px;margin-bottom:10px">
              <div style="width:3px;height:36px;border-radius:99px;background:${p.resultado === "Vitória" ? "#4ade80" : "#f87171"};flex-shrink:0"></div>
              <div style="flex:1"><p style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#e2e8f0;margin:0 0 2px;text-transform:uppercase">${p.torneio}</p>${p.data ? `<p style="font-size:11px;color:var(--muted);margin:0">${new Date(p.data + "T12:00:00").toLocaleDateString("pt-BR")}</p>` : ""}</div>

/* ═══════════════════════════════════════════
   PARTICLE CANVAS — Effect #7
═══════════════════════════════════════════ */
function ParticleCanvas(container, h = 120) {
  const cv = document.createElement('canvas');
  cv.style.cssText = `width:100%;height:${h}px;display:block`;
  container.appendChild(cv);
  const ctx = cv.getContext('2d');
  let W, H, pts = [], raf, mx = 9999, my = 9999;
  const resize = () => {
    const r = cv.getBoundingClientRect();
    cv.width = r.width * devicePixelRatio; cv.height = r.height * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio); W = r.width; H = r.height;
  };
  const init = () => {
    pts = []; const n = Math.floor(W * H / 2600);
    for (let i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .38, vy: (Math.random() - .5) * .38, r: Math.random() * 1.8 + .4, a: Math.random() * .65 + .2 });
  };
  resize(); init();
  const ro = new ResizeObserver(() => { resize(); init(); });
  ro.observe(cv.parentElement || cv);
  cv.addEventListener('mousemove', e => { const r = cv.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; });
  cv.addEventListener('touchmove', e => { const r = cv.getBoundingClientRect(), t = e.touches[0]; mx = t.clientX - r.left; my = t.clientY - r.top; }, {passive:true});
  const draw = () => {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
      if (d < 85) { ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.strokeStyle = `rgba(212,255,0,${(1 - d / 85) * .12})`; ctx.lineWidth = .6; ctx.stroke(); }
    }
    pts.forEach(p => {
      const dx = p.x - mx, dy = p.y - my, d = Math.sqrt(dx * dx + dy * dy);
      if (d < 75) { p.vx += (dx / d) * .055; p.vy += (dy / d) * .055; }
      p.vx *= .996; p.vy *= .996; p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0; if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(212,255,0,${p.a * .5})`; ctx.fill();
    });
    raf = requestAnimationFrame(draw);
  };
  draw();
  return () => { cancelAnimationFrame(raf); ro.disconnect(); };
}

/* ═══════════════════════════════════════════
   SKILL BARS ANIMADAS — Effect #10
═══════════════════════════════════════════ */
function animSkillBars(container) {
  container.querySelectorAll('.sbar-fill').forEach((el, i) => {
    const w = el.style.width;
    el.style.width = '0';
    el.style.transition = 'width 1.4s cubic-bezier(.19,1,.22,1) ' + (i * 120) + 'ms';
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        setTimeout(() => { el.style.width = w; }, 60);
        obs.disconnect();
      }
    }, { threshold: .15 });
    obs.observe(el);
  });
}

/* ═══════════════════════════════════════════
   COUNTER ANIMADO — Effect #4
═══════════════════════════════════════════ */
function Counter(container, target, suffix, label, delay = 0, color = 'var(--y)') {
  const div = document.createElement('div');
  div.className = 'counter-card card-shimmer';
  div.style.cssText = 'position:relative;overflow:hidden';
  div.innerHTML = `
    <div class="cprog" id="cprog-${target}-${delay}"></div>
    <strong style="font-family:DM Mono,sans-serif;font-size:34px;font-weight:500;color:${color};line-height:1;text-shadow:0 0 28px ${color}66;display:block;margin-bottom:4px" id="cv-${target}-${delay}">0${suffix}</strong>
    <span class="slbl" style="font-size:9px;letter-spacing:.22em">${label}</span>
    <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${color}44,transparent)"></div>`;
  div.addEventListener('mousemove', magOn);
  div.addEventListener('mouseleave', magOff);
  container.appendChild(div);
  let done = false;
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !done) {
      done = true;
      const prog = div.querySelector(`#cprog-${target}-${delay}`);
      const vEl = div.querySelector(`#cv-${target}-${delay}`);
      setTimeout(() => {
        if (prog) prog.classList.add('go');
        let start = null, dur = 1500;
        const step = ts => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / dur, 1), e = 1 - Math.pow(1 - p, 4);
          vEl.textContent = Math.floor(e * target) + suffix;
          if (p < 1) requestAnimationFrame(step); else vEl.textContent = target + suffix;
        };
        requestAnimationFrame(step);
      }, delay);
    }
  }, { threshold: .3 });
  obs.observe(div);
}

/* ═══════════════════════════════════════════
   MAGNETIC CARD HOVER — Effect #2
═══════════════════════════════════════════ */
function applyMag(el) {
  el.classList.add('mag');
  el.addEventListener('mousemove', magOn);
  el.addEventListener('mouseleave', magOff);
}

═══════════════════════════════════════════ */
(async function init() {
  const tok = localStorage.getItem("am_tok"), uid = localStorage.getItem("am_uid");
  if (tok && uid) {
    FB.token = tok; FB.uid = uid;
    try {
      const d = await FB.getDoc(`usuarios/${uid}`);
      if (d) {
        APP.user = { uid, nome: d.nome || "Atleta", email: d.email || "" };
        APP.plan = d.plano || "starter"; APP.cargo = d.cargo || "paciente";
      } else { FB.signOut(); }
    } catch (e) { FB.signOut(); }
  }
  // Loader
  const app = $("app");
  app.innerHTML = `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg0)">

    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:rgba(212,255,0,.07);border:1px solid rgba(212,255,0,.2);display:flex;align-items:center;justify-content:center;color:rgba(212,255,0,.75)"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M7.5 4.2A8 8 0 0110 10a8 8 0 01-5.8 2.5M16.5 19.8A8 8 0 0114 14a8 8 0 015.8-2.5"/></svg></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <p class="slbl" style="color:rgba(212,255,0,.6);letter-spacing:.3em">Carregando Motor AceMind</p>
    <div style="width:120px;height:2px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden"><div style="height:100%;border-radius:99px;background:linear-gradient(90deg,transparent,var(--y),transparent);animation:shine 1.5s ease-in-out infinite;width:60%;position:relative"></div></div>

</div>`;
  setTimeout(() => render(), 300);
})();
</script>
