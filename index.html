<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceMind - Psicologia de Alta Performance</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { 'optic-yellow': '#ccff00' } } }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // VOCÊ PRECISA SUBSTITUIR ESTES DADOS PELOS DO SEU PROJETO FIREBASE
    const firebaseConfig = {
     apiKey: "AIzaSyA-Wkrh3xZc-V0snzsjvg4i9ffxWCKyu0M",
  authDomain: "ace-mind-c13a1.firebaseapp.com",
  projectId: "ace-mind-c13a1",
  storageBucket: "ace-mind-c13a1.firebasestorage.app",
  messagingSenderId: "22508213575",
  appId: "1:22508213575:web:a7a38ac233b893f992e862"
    };

    // Inicializando o sistema
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Deixando o Firebase acessível para o React
    window.firebaseDB = db;
    window.firebaseAuth = auth;
    window.firebaseAPI = { collection, addDoc, getDocs, signInWithEmailAndPassword, onAuthStateChanged, signOut };
  </script>

  <style>
    body { background-color: #020617; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-950 text-white">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // TELA DE LOGIN (Segurança)
    // ==========================================
    const TelaLogin = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');

      const fazerLogin = async (e) => {
        e.preventDefault();
        try {
          // Tenta logar no Firebase
          await window.firebaseAPI.signInWithEmailAndPassword(window.firebaseAuth, email, senha);
        } catch (error) {
          setErro("Falha no login. Verifique suas credenciais ou se já configurou o Firebase.");
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white/5 backdrop-blur-md border border-white/10 p-8 rounded-2xl w-full max-w-md">
            <h1 className="text-4xl font-light tracking-wider text-center mb-8">Ace<span className="text-optic-yellow font-bold">Mind</span></h1>
            {erro && <p className="text-red-500 text-sm mb-4 text-center">{erro}</p>}
            <form onSubmit={fazerLogin} className="space-y-4">
              <div>
                <label className="text-slate-400 text-sm">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white mt-1" required />
              </div>
              <div>
                <label className="text-slate-400 text-sm">Senha</label>
                <input type="password" value={senha} onChange={e => setSenha(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white mt-1" required />
              </div>
              <button type="submit" className="w-full bg-optic-yellow text-slate-950 font-bold py-3 rounded-lg hover:bg-[#b3e600] transition mt-6">
                Entrar no Sistema
              </button>
            </form>
          </div>
        </div>
      );
    };

    // ==========================================
    // APP MOBILE DO ATLETA (Envia dados pro Banco)
    // ==========================================
    const MobilePlayerApp = () => {
      const [energia, setEnergia] = useState(5);
      const [foco, setFoco] = useState(5);
      const [salvando, setSalvando] = useState(false);

      const salvarCheckin = async () => {
        setSalvando(true);
        try {
          // Salva um documento real no Banco de Dados
          await window.firebaseAPI.addDoc(window.firebaseAPI.collection(window.firebaseDB, "checkins"), {
            atleta: "Carlos Alcaraz",
            energia: energia,
            foco: foco,
            data: new Date().toISOString()
          });
          alert("Check-in salvo com sucesso no banco de dados!");
        } catch (error) {
          alert("Erro ao salvar. Verifique se as chaves do Firebase estão configuradas.");
          console.error(error);
        }
        setSalvando(false);
      };

      return (
        <div className="flex items-center justify-center min-h-screen p-4">
          <div className="w-full max-w-[375px] h-[750px] bg-slate-950 rounded-[2.5rem] border-[6px] border-slate-800 overflow-hidden relative shadow-2xl flex flex-col">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-800 rounded-b-xl z-20"></div>
            <div className="pt-12 pb-6 px-6 bg-gradient-to-b from-optic-yellow/10 to-transparent">
              <h2 className="text-2xl text-white font-light">E aí, Atleta.</h2>
            </div>
            <div className="flex-1 overflow-y-auto px-6 pb-24 space-y-6 custom-scrollbar">
              <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5">
                <h3 className="text-white font-medium mb-4">Diário de Bordo</h3>
                <div className="space-y-6">
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Desfocado</span><span>Foco Total</span></div>
                    <input type="range" min="1" max="10" value={foco} onChange={(e) => setFoco(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-[#ccff00]" />
                  </div>
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Exausto</span><span>Energizado</span></div>
                    <input type="range" min="1" max="10" value={energia} onChange={(e) => setEnergia(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-[#ccff00]" />
                  </div>
                  <button onClick={salvarCheckin} disabled={salvando} className="w-full bg-optic-yellow text-slate-950 font-medium py-3 rounded-xl hover:bg-[#b3e600] transition-colors disabled:opacity-50">
                    {salvando ? 'Salvando...' : 'Salvar Check-in'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // MENU PRINCIPAL & CONTROLE DE ACESSO
    // ==========================================
    const App = () => {
      const [usuarioLogado, setUsuarioLogado] = useState(null);
      const [carregando, setCarregando] = useState(true);
      const [telaAtual, setTelaAtual] = useState('mobile'); // Forçando abrir no mobile para teste

      useEffect(() => {
        // Monitora se tem alguém logado no sistema
        setTimeout(() => {
          if (window.firebaseAuth) {
             window.firebaseAPI.onAuthStateChanged(window.firebaseAuth, (user) => {
              setUsuarioLogado(user);
              setCarregando(false);
            });
          } else {
             setCarregando(false); // Para não travar se o Firebase não carregar
          }
        }, 1000);
      }, []);

      const fazerLogout = () => {
        window.firebaseAPI.signOut(window.firebaseAuth);
      };

      if (carregando) return <div className="min-h-screen flex items-center justify-center text-optic-yellow">Conectando ao banco de dados...</div>;

      // Se não tiver usuário logado e as chaves estiverem configuradas, mostra o Login
      // MANTIVE UMA TRAVA DE SEGURANÇA: Se você ainda não colocou as chaves do Firebase, ele libera a tela para você ver o design.
      if (!usuarioLogado && window.firebaseConfig && window.firebaseConfig.apiKey !== "SUA_CHAVE_AQUI") {
        return <TelaLogin />;
      }

      return (
        <div>
          <div className="bg-slate-900 p-4 flex justify-center items-center gap-4 border-b border-white/10">
            <span className="text-slate-400 text-sm">Modo de Teste de Integração</span>
            {usuarioLogado && (
               <button onClick={fazerLogout} className="text-red-400 hover:text-red-300 text-sm ml-auto">Sair da Conta</button>
            )}
          </div>
          <MobilePlayerApp />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
