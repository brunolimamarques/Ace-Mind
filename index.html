<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AceMind - Psicologia do Tênis</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { 'optic-yellow': '#ccff00' } } } }</script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body { background-color: #020617; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .menu-transition { transition: transform 0.3s ease-in-out; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // =========================================================================
    // COLE SUAS CHAVES AQUI
    // =========================================================================
    const firebaseConfig = {
 apiKey: "AIzaSyA-Wkrh3xZc-V0snzsjvg4i9ffxWCKyu0M",
  authDomain: "ace-mind-c13a1.firebaseapp.com",
  databaseURL: "https://ace-mind-c13a1-default-rtdb.firebaseio.com",
  projectId: "ace-mind-c13a1",
  storageBucket: "ace-mind-c13a1.firebasestorage.app",
  messagingSenderId: "22508213575",
  appId: "1:22508213575:web:a7a38ac233b893f992e862"
    };

    try {
      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
      window.auth = getAuth(app);
      window.storage = getStorage(app);
      
      window.fbAPI = { 
        collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc, updateDoc, deleteDoc, where,
        signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut,
        ref, uploadBytesResumable, getDownloadURL, deleteObject
      };
      window.firebasePronto = true;
    } catch (erro) { window.firebaseErro = true; console.error(erro); }
  </script>
</head>
<body class="overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Menu: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>,
      Close: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
      Dashboard: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
      Users: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>,
      Chart: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>,
      Video: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>,
      Trash: () => <svg className="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
      Calendar: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>,
      Profile: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>,
      Crosshair: () => <svg className="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
    };

    const calcularRisco = (foco, energia) => {
      if (foco <= 4 || energia <= 4) return { cor: 'bg-red-500', texto: 'Risco Alto', border: 'border-red-500/30' };
      if (foco <= 6 || energia <= 6) return { cor: 'bg-yellow-500', texto: 'Atenção', border: 'border-yellow-500/30' };
      return { cor: 'bg-green-500', texto: 'Estável', border: 'border-green-500/30' };
    };

    // ==============================================================================
    // APP DO PACIENTE
    // ==============================================================================
    const MobileApp = ({ usuarioAtual }) => {
      const [foco, setFoco] = useState(5);
      const [energia, setEnergia] = useState(5);
      const [salvando, setSalvando] = useState(false);

      const salvarCheckin = async () => {
        setSalvando(true);
        try {
          await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "checkins"), {
            pacienteId: usuarioAtual.uid, nome: usuarioAtual.nome, email: usuarioAtual.email, foco: parseInt(foco), energia: parseInt(energia), data: new Date().toISOString()
          });
          alert("Check-in enviado com sucesso!");
          setFoco(5); setEnergia(5);
        } catch (error) { alert("Erro ao salvar."); }
        setSalvando(false);
      };

      return (
        <div className="flex items-center justify-center min-h-[calc(100vh-64px)] p-0 sm:p-4 bg-black/90">
          <div className="w-full h-full sm:max-w-[375px] sm:h-[750px] bg-slate-950 sm:rounded-[2.5rem] sm:border-[6px] sm:border-slate-800 overflow-hidden relative sm:shadow-2xl flex flex-col">
            <div className="pt-8 pb-6 px-6 bg-gradient-to-b from-optic-yellow/10 to-transparent shrink-0">
              <h2 className="text-2xl text-white font-light truncate">Olá, {usuarioAtual.nome}</h2>
              <p className="text-slate-400 text-sm mt-1">Diário pós-treino.</p>
            </div>
            <div className="flex-1 overflow-y-auto px-6 pb-24 space-y-6 custom-scrollbar">
              <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5">
                <div className="space-y-6">
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Desfocado</span><span>Foco Total</span></div>
                    <input type="range" min="1" max="10" value={foco} onChange={(e) => setFoco(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-[#ccff00]" />
                  </div>
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Exausto</span><span>Energizado</span></div>
                    <input type="range" min="1" max="10" value={energia} onChange={(e) => setEnergia(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-[#ccff00]" />
                  </div>
                  <button onClick={salvarCheckin} disabled={salvando} className="w-full bg-optic-yellow text-slate-950 font-bold py-3 rounded-xl hover:bg-[#b3e600] disabled:opacity-50 transition">
                    {salvando ? 'Enviando...' : 'Salvar Diário'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==============================================================================
    // MÓDULOS DO PSICÓLOGO
    // ==============================================================================

    // --- MÓDULO 1: VISÃO GERAL ---
    const ModuloDashboard = ({ checkins }) => (
      <div className="space-y-6 animate-fade-in pb-10">
        <h2 className="text-xl md:text-2xl font-light border-b border-white/10 pb-4">Visão Geral & Alertas</h2>
        <div className="glass-panel p-4 md:p-6 rounded-2xl">
          <h3 className="text-base md:text-lg font-medium mb-4 flex items-center gap-2">Radares de Atenção Diários</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {checkins.length === 0 && <p className="text-slate-500 col-span-full">Nenhum check-in registrado.</p>}
            {checkins.slice(0, 9).map((reg) => {
              const risco = calcularRisco(reg.foco, reg.energia);
              return (
                <div key={reg.id} className={`bg-slate-900/80 p-4 rounded-xl border ${risco.border}`}>
                  <div className="flex justify-between items-start mb-2">
                    <div className="w-4/5">
                      <span className="font-bold text-white truncate block">{reg.nome || reg.email.split('@')[0]}</span>
                      <span className="text-[10px] text-slate-500">{new Date(reg.data).toLocaleString('pt-BR')}</span>
                    </div>
                    <div className={`w-3 h-3 rounded-full shrink-0 ${risco.cor} shadow-[0_0_8px_currentColor]`}></div>
                  </div>
                  <p className="text-xs text-slate-300 mb-2">{risco.texto}</p>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );

    // --- MÓDULO 2: PERFIL ESPORTIVO ---
    const ModuloPerfil = ({ atletas }) => {
      const [atletaId, setAtletaId] = useState("");
      const [perfil, setPerfil] = useState({ categoria: "", ranking: "", estilo: "", mao: "", lesoes: "" });
      const [salvando, setSalvando] = useState(false);

      useEffect(() => {
        if(!atletaId) return;
        const carregar = async () => {
          const docSnap = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "prontuarios", atletaId));
          if (docSnap.exists() && docSnap.data().perfil) { setPerfil(docSnap.data().perfil); }
          else { setPerfil({ categoria: "", ranking: "", estilo: "", mao: "", lesoes: "" }); }
        };
        carregar();
      }, [atletaId]);

      const salvarPerfil = async () => {
        setSalvando(true);
        await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "prontuarios", atletaId), { perfil }, { merge: true });
        setSalvando(false);
        alert("Perfil atualizado!");
      };

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-white/10 pb-4 gap-4">
            <h2 className="text-xl md:text-2xl font-light">Dados Básicos e Esportivos</h2>
            <select value={atletaId} onChange={e => setAtletaId(e.target.value)} className="w-full sm:w-auto bg-slate-900 border border-white/20 text-white rounded p-2 outline-none">
              <option value="">Selecione o Atleta...</option>
              {atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
            </select>
          </div>

          {!atletaId ? <div className="glass-panel p-6 text-center text-slate-500">Selecione um atleta.</div> : (
            <div className="glass-panel p-4 md:p-6 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label className="text-xs text-slate-400 block mb-1">Categoria</label>
                <input type="text" value={perfil.categoria} onChange={e=>setPerfil({...perfil, categoria: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-3 mb-4" />
                <label className="text-xs text-slate-400 block mb-1">Ranking Atual</label>
                <input type="text" value={perfil.ranking} onChange={e=>setPerfil({...perfil, ranking: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-3 mb-4" />
                <label className="text-xs text-slate-400 block mb-1">Mão Dominante</label>
                <select value={perfil.mao} onChange={e=>setPerfil({...perfil, mao: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-3">
                  <option value="">Selecione...</option><option value="Destro">Destro</option><option value="Canhoto">Canhoto</option><option value="Ambidestro">Ambidestro</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-400 block mb-1">Estilo de Jogo</label>
                <input type="text" placeholder="Ex: Fundo de quadra agressivo" value={perfil.estilo} onChange={e=>setPerfil({...perfil, estilo: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-3 mb-4" />
                <label className="text-xs text-slate-400 block mb-1">Histórico de Lesões Recentes</label>
                <textarea value={perfil.lesoes} onChange={e=>setPerfil({...perfil, lesoes: e.target.value})} className="w-full h-32 bg-slate-900 border border-white/20 rounded p-3 custom-scrollbar text-sm"></textarea>
              </div>
              <div className="md:col-span-2 flex justify-end">
                <button onClick={salvarPerfil} className="w-full md:w-auto bg-optic-yellow text-black font-bold px-6 py-3 rounded">{salvando ? 'Salvando...' : 'Salvar Ficha'}</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- MÓDULO 3: PRONTUÁRIO CLÍNICO ---
    const ModuloProntuario = ({ atletas }) => {
      const [atletaSelecionadoId, setAtletaSelecionadoId] = useState("");
      const [rotinas, setRotinas] = useState({ pre: "", pos: "" });
      const [editandoRotina, setEditandoRotina] = useState(false);
      const [anotacoes, setAnotacoes] = useState([]);
      const [novaAnotacao, setNovaAnotacao] = useState("");
      const [editandoAnotacaoId, setEditandoAnotacaoId] = useState(null);
      const [videos, setVideos] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [progresso, setProgresso] = useState(0);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (!atletaSelecionadoId) return;
        carregarProntuario(atletaSelecionadoId);
      }, [atletaSelecionadoId]);

      const carregarProntuario = async (id) => {
        const docSnap = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "prontuarios", id));
        if (docSnap.exists()) { setRotinas(docSnap.data().rotinas || { pre: "", pos: "" }); } 
        else { setRotinas({ pre: "Defina rotina pré-saque.", pos: "Defina rotina pós-erro." }); }

        const qAnotacoes = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${id}/soap`), window.fbAPI.orderBy("data", "desc"));
        const snapAnot = await window.fbAPI.getDocs(qAnotacoes);
        setAnotacoes(snapAnot.docs.map(d => ({ id: d.id, ...d.data() })));

        const qVideos = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${id}/videos`), window.fbAPI.orderBy("dataEnvio", "desc"));
        const snapVideos = await window.fbAPI.getDocs(qVideos);
        setVideos(snapVideos.docs.map(d => ({ id: d.id, ...d.data() })));
      };

      const salvarRotinas = async () => {
        await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "prontuarios", atletaSelecionadoId), { rotinas }, { merge: true });
        setEditandoRotina(false);
      };

      const salvarAnotacao = async () => {
        if (!novaAnotacao.trim() || !atletaSelecionadoId) return;
        const soapRef = window.fbAPI.collection(window.db, `prontuarios/${atletaSelecionadoId}/soap`);
        if (editandoAnotacaoId) {
          await window.fbAPI.updateDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/soap`, editandoAnotacaoId), { texto: novaAnotacao, editadoEm: new Date().toISOString() });
        } else {
          await window.fbAPI.addDoc(soapRef, { texto: novaAnotacao, data: new Date().toISOString(), editadoEm: null });
        }
        setNovaAnotacao(""); setEditandoAnotacaoId(null);
        carregarProntuario(atletaSelecionadoId);
      };

      const excluirAnotacao = async (id) => {
        if(confirm("Apagar esta anotação?")) {
          await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/soap`, id));
          carregarProntuario(atletaSelecionadoId);
        }
      };

      const handleVideoUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || !atletaSelecionadoId) return;
        setUploading(true);
        const fileName = `video_${Date.now()}.${file.name.split('.').pop()}`;
        const storageRef = window.fbAPI.ref(window.storage, `atletas/${atletaSelecionadoId}/videos/${fileName}`);
        const uploadTask = window.fbAPI.uploadBytesResumable(storageRef, file);

        uploadTask.on('state_changed', 
          (snap) => setProgresso((snap.bytesTransferred / snap.totalBytes) * 100), 
          (err) => { setUploading(false); alert("Erro ao enviar vídeo."); }, 
          async () => {
            const url = await window.fbAPI.getDownloadURL(uploadTask.snapshot.ref);
            await window.fbAPI.addDoc(window.fbAPI.collection(window.db, `prontuarios/${atletaSelecionadoId}/videos`), { url, nomeArquivo: file.name, dataEnvio: new Date().toISOString() });
            setUploading(false); setProgresso(0); fileInputRef.current.value = "";
            carregarProntuario(atletaSelecionadoId);
          }
        );
      };

      const excluirVideo = async (video) => {
        if(confirm("Apagar vídeo?")) {
          try {
            await window.fbAPI.deleteObject(window.fbAPI.ref(window.storage, video.url));
            await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/videos`, video.id));
            carregarProntuario(atletaSelecionadoId);
          } catch(e) { alert("Erro ao apagar vídeo."); }
        }
      };

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-white/10 pb-4 gap-4">
            <h2 className="text-xl md:text-2xl font-light">Prontuário Clínico (SOAP)</h2>
            <select value={atletaSelecionadoId} onChange={e => setAtletaSelecionadoId(e.target.value)} className="w-full sm:w-auto bg-slate-900 border border-white/20 text-white rounded p-2 outline-none">
              <option value="">Selecione o Atleta...</option>
              {atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
            </select>
          </div>

          {!atletaSelecionadoId ? <div className="glass-panel p-6 text-center text-slate-500">Selecione um atleta.</div> : (
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
              <div className="space-y-6 xl:col-span-1">
                <div className="glass-panel p-4 md:p-6 rounded-2xl">
                  <div className="flex justify-between items-center mb-4">
                    <h4 className="font-bold text-optic-yellow">Mapeamento de Rotinas</h4>
                    <button onClick={() => editandoRotina ? salvarRotinas() : setEditandoRotina(true)} className="text-xs bg-white/10 px-2 py-1 rounded">{editandoRotina ? 'Salvar' : 'Editar'}</button>
                  </div>
                  <div className="space-y-4 text-sm">
                    <div><label className="text-xs text-slate-400">Pré-saque</label>{editandoRotina ? <input type="text" value={rotinas.pre} onChange={e=>setRotinas({...rotinas, pre: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /> : <div className="bg-slate-900 p-2 rounded mt-1 break-words">{rotinas.pre}</div>}</div>
                    <div><label className="text-xs text-slate-400">Pós-erro</label>{editandoRotina ? <input type="text" value={rotinas.pos} onChange={e=>setRotinas({...rotinas, pos: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /> : <div className="bg-slate-900 p-2 rounded mt-1 break-words">{rotinas.pos}</div>}</div>
                  </div>
                </div>

                <div className="glass-panel p-4 md:p-6 rounded-2xl">
                  <h4 className="font-bold mb-4 flex items-center gap-2"><Icons.Video /> Linguagem Corporal</h4>
                  <div className="mb-4">
                    <input type="file" accept="video/mp4,video/quicktime" ref={fileInputRef} onChange={handleVideoUpload} className="hidden" id="video-upload" />
                    <label htmlFor="video-upload" className={`w-full h-20 bg-slate-900 rounded-lg border-2 border-dashed ${uploading ? 'border-optic-yellow' : 'border-white/20'} flex flex-col items-center justify-center text-slate-400 text-sm hover:border-optic-yellow cursor-pointer text-center px-2`}>
                      {uploading ? `Enviando... ${Math.round(progresso)}%` : '+ Escolher Vídeo (.mp4)'}
                    </label>
                    {uploading && <div className="w-full bg-slate-800 h-1 mt-2 rounded"><div className="bg-optic-yellow h-1" style={{width: `${progresso}%`}}></div></div>}
                  </div>
                  <div className="space-y-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                    {videos.map(v => (
                      <div key={v.id} className="bg-slate-900/50 p-3 rounded-xl border border-white/5 group">
                        <div className="flex justify-between items-start mb-2"><p className="text-xs font-bold truncate max-w-[150px]">{v.nomeArquivo}</p><button onClick={() => excluirVideo(v)} className="text-red-400 opacity-100 md:opacity-0 md:group-hover:opacity-100"><Icons.Trash /></button></div>
                        <video src={v.url} controls className="w-full rounded bg-black max-h-[120px] object-contain"></video>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="xl:col-span-2 glass-panel p-4 md:p-6 rounded-2xl flex flex-col h-[600px] md:h-[700px]">
                <h4 className="font-bold mb-4">Histórico Clínico (SOAP)</h4>
                <div className="bg-slate-900 p-4 rounded-xl mb-6 flex-shrink-0">
                  <textarea value={novaAnotacao} onChange={e=>setNovaAnotacao(e.target.value)} placeholder="Subjetivo / Objetivo / Avaliação / Plano..." className="w-full h-24 bg-transparent outline-none resize-none text-sm text-slate-200"></textarea>
                  <div className="flex justify-end mt-2 border-t border-white/5 pt-2"><button onClick={salvarAnotacao} className="bg-optic-yellow text-black px-4 py-2 rounded text-sm font-bold w-full sm:w-auto">{editandoAnotacaoId ? 'Atualizar' : 'Salvar Nova Sessão'}</button></div>
                </div>
                <div className="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2">
                  {anotacoes.map(a => (
                    <div key={a.id} className="bg-slate-900/50 p-4 rounded-xl border border-white/5 group hover:border-white/10">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-3 border-b border-white/5 pb-2 gap-2">
                        <div><span className="text-xs text-optic-yellow font-bold uppercase">{new Date(a.data).toLocaleString('pt-BR', {dateStyle:'long', timeStyle:'short'})}</span>{a.editadoEm && <span className="text-[10px] text-slate-500 sm:ml-2 block sm:inline">(Editado: {new Date(a.editadoEm).toLocaleString('pt-BR')})</span>}</div>
                        <div className="flex gap-4 sm:gap-3 opacity-100 md:opacity-0 md:group-hover:opacity-100"><button onClick={() => {setNovaAnotacao(a.texto); setEditandoAnotacaoId(a.id);}} className="text-xs text-blue-400 uppercase font-bold sm:normal-case sm:font-normal">Editar</button><button onClick={() => excluirAnotacao(a.id)} className="text-xs text-red-400 uppercase font-bold sm:normal-case sm:font-normal">Excluir</button></div>
                      </div>
                      <p className="text-sm whitespace-pre-wrap leading-relaxed">{a.texto}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };
    // --- MÓDULO 4: MOMENTOS CRÍTICOS (Estatísticas de Partida Real) ---
    const ModuloMomentosCriticos = ({ atletas }) => {
      const [atletaId, setAtletaId] = useState("");
      const [partidas, setPartidas] = useState([]);
      const [novaPartida, setNovaPartida] = useState({
        torneio: "", data: "", resultado: "Vitória", breakPointsSalvos: "", duplasFaltas: "", errosNaoForcados: ""
      });
      const [salvando, setSalvando] = useState(false);

      useEffect(() => {
        if (!atletaId) return;
        const carregarPartidas = async () => {
          const q = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${atletaId}/partidas`), window.fbAPI.orderBy("data", "desc"));
          const snap = await window.fbAPI.getDocs(q);
          setPartidas(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        };
        carregarPartidas();
      }, [atletaId]);

      const registrarPartida = async () => {
        if (!novaPartida.torneio || !novaPartida.data) return alert("Preencha Torneio e Data.");
        setSalvando(true);
        try {
          const docRef = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, `prontuarios/${atletaId}/partidas`), {
            ...novaPartida, dataRegistro: new Date().toISOString()
          });
          setPartidas([{ id: docRef.id, ...novaPartida }, ...partidas].sort((a,b) => new Date(b.data) - new Date(a.data)));
          setNovaPartida({ torneio: "", data: "", resultado: "Vitória", breakPointsSalvos: "", duplasFaltas: "", errosNaoForcados: "" });
        } catch (e) { alert("Erro ao salvar."); }
        setSalvando(false);
      };

      const apagarPartida = async (id) => {
        if(confirm("Apagar este registro de partida?")) {
          await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaId}/partidas`, id));
          setPartidas(partidas.filter(p => p.id !== id));
        }
      };

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-white/10 pb-4 gap-4">
            <h2 className="text-xl md:text-2xl font-light">Estatísticas de Partidas (Choking)</h2>
            <select value={atletaId} onChange={e => setAtletaId(e.target.value)} className="w-full sm:w-auto bg-slate-900 border border-white/20 text-white rounded p-2 outline-none">
              <option value="">Selecione o Atleta...</option>
              {atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
            </select>
          </div>
          
          {!atletaId ? <div className="glass-panel p-6 text-center text-slate-500">Selecione um atleta para registrar dados de jogo.</div> : (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-1 glass-panel p-4 md:p-6 rounded-2xl space-y-4">
                <h3 className="font-bold text-optic-yellow mb-4">Lançar Nova Partida</h3>
                
                <div><label className="text-xs text-slate-400">Torneio / Fase</label><input type="text" placeholder="Ex: Roland Garros - 1ª Rodada" value={novaPartida.torneio} onChange={e=>setNovaPartida({...novaPartida, torneio: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /></div>
                <div><label className="text-xs text-slate-400">Data do Jogo</label><input type="date" value={novaPartida.data} onChange={e=>setNovaPartida({...novaPartida, data: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1 text-white" /></div>
                <div><label className="text-xs text-slate-400">Resultado</label><select value={novaPartida.resultado} onChange={e=>setNovaPartida({...novaPartida, resultado: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1"><option value="Vitória">Vitória</option><option value="Derrota">Derrota</option></select></div>
                
                <div className="pt-4 border-t border-white/10 mt-4">
                  <h4 className="text-xs font-bold text-slate-300 mb-3">Métricas de Pressão</h4>
                  <div className="space-y-3">
                    <div><label className="text-xs text-slate-400">Break Points Salvos (%)</label><input type="number" placeholder="Ex: 65" value={novaPartida.breakPointsSalvos} onChange={e=>setNovaPartida({...novaPartida, breakPointsSalvos: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /></div>
                    <div><label className="text-xs text-slate-400">Duplas Faltas Críticas</label><input type="number" placeholder="Quantas ocorreram em BP ou vantagens" value={novaPartida.duplasFaltas} onChange={e=>setNovaPartida({...novaPartida, duplasFaltas: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /></div>
                    <div><label className="text-xs text-slate-400">Erros Não Forçados (Tie-breaks)</label><input type="number" value={novaPartida.errosNaoForcados} onChange={e=>setNovaPartida({...novaPartida, errosNaoForcados: e.target.value})} className="w-full bg-slate-900 border border-white/20 rounded p-2 mt-1" /></div>
                  </div>
                </div>

                <button onClick={registrarPartida} disabled={salvando} className="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded transition mt-4 disabled:opacity-50">{salvando ? 'Salvando...' : 'Registrar Estatística'}</button>
              </div>
              
              <div className="lg:col-span-2 glass-panel p-4 md:p-6 rounded-2xl flex flex-col h-[650px]">
                <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><Icons.Crosshair /> Histórico de Desempenho</h3>
                
                <div className="grid grid-cols-3 gap-4 mb-6 shrink-0">
                  <div className="bg-slate-900 p-4 rounded-xl border border-white/5 text-center"><p className="text-xs text-slate-400">Total de Jogos</p><p className="text-2xl font-bold text-white">{partidas.length}</p></div>
                  <div className="bg-slate-900 p-4 rounded-xl border border-white/5 text-center"><p className="text-xs text-slate-400">Vitórias</p><p className="text-2xl font-bold text-green-400">{partidas.filter(p=>p.resultado==='Vitória').length}</p></div>
                  <div className="bg-slate-900 p-4 rounded-xl border border-white/5 text-center"><p className="text-xs text-slate-400">Derrotas</p><p className="text-2xl font-bold text-red-400">{partidas.filter(p=>p.resultado==='Derrota').length}</p></div>
                </div>

                <div className="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2">
                  {partidas.length === 0 && <p className="text-center text-slate-500 mt-10">Nenhuma partida registrada.</p>}
                  {partidas.map(p => (
                    <div key={p.id} className="bg-slate-900/50 p-4 rounded-xl border border-white/5 relative group hover:border-white/10 transition">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <p className="font-bold text-optic-yellow">{p.torneio}</p>
                          <p className="text-xs text-slate-400">{new Date(p.data + 'T12:00:00').toLocaleDateString('pt-BR')} • <span className={p.resultado === 'Vitória' ? 'text-green-400 font-bold' : 'text-red-400 font-bold'}>{p.resultado}</span></p>
                        </div>
                        <button onClick={() => apagarPartida(p.id)} className="text-red-400 opacity-100 md:opacity-0 md:group-hover:opacity-100"><Icons.Trash /></button>
                      </div>
                      <div className="grid grid-cols-3 gap-2 mt-4 text-xs bg-black/30 p-2 rounded">
                        <div><span className="text-slate-500 block">BP Salvos:</span> <strong className="text-white">{p.breakPointsSalvos}%</strong></div>
                        <div><span className="text-slate-500 block">Duplas Faltas:</span> <strong className="text-white">{p.duplasFaltas}</strong></div>
                        <div><span className="text-slate-500 block">Erros (TB):</span> <strong className="text-white">{p.errosNaoForcados}</strong></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- MÓDULO 5: AGENDA & TORNEIOS ---
    const ModuloAgenda = ({ atletas }) => {
      const [sessoes, setSessoes] = useState([]);
      const [novaSessao, setNovaSessao] = useState({ atletaId: "", dataHora: "", link: "" });
      const [torneios] = useState([{ id: 1, nome: "Roland Garros", data: "2026-05-25" }, { id: 2, nome: "Challenger SP", data: "2026-04-10" }]);
      const agora = new Date();
      const limite48h = new Date(agora.getTime() + (48 * 60 * 60 * 1000));

      useEffect(() => {
        const carregar = async () => {
          const q = window.fbAPI.query(window.fbAPI.collection(window.db, "agenda"), window.fbAPI.orderBy("dataHora", "asc"));
          const snap = await window.fbAPI.getDocs(q);
          setSessoes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        };
        carregar();
      }, []);

      const agendarSessao = async () => {
        if(!novaSessao.atletaId || !novaSessao.dataHora) return;
        const atleta = atletas.find(a => a.id === novaSessao.atletaId);
        const linkGerado = novaSessao.link || `https://meet.google.com/acemind-${Math.floor(Math.random()*1000)}`;
        const docRef = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "agenda"), { atletaId: atleta.id, nome: atleta.nome, email: atleta.email, dataHora: novaSessao.dataHora, link: linkGerado });
        setSessoes([...sessoes, { id: docRef.id, atletaId: atleta.id, nome: atleta.nome, email: atleta.email, dataHora: novaSessao.dataHora, link: linkGerado }].sort((a,b) => new Date(a.dataHora) - new Date(b.dataHora)));
        setNovaSessao({ atletaId: "", dataHora: "", link: "" });
      };

      const apagarSessao = async (id) => {
        await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, "agenda", id));
        setSessoes(sessoes.filter(s => s.id !== id));
      }

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <h2 className="text-xl md:text-2xl font-light border-b border-white/10 pb-4">Calendários & Agendamentos</h2>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div className="glass-panel p-4 md:p-6 rounded-2xl flex flex-col h-[600px] md:h-[650px]">
              <h3 className="text-lg font-bold text-optic-yellow mb-4">Sessões Clínicas</h3>
              <div className="bg-slate-900 border border-white/10 p-4 rounded-xl mb-6 space-y-3 shrink-0">
                <select value={novaSessao.atletaId} onChange={e=>setNovaSessao({...novaSessao, atletaId: e.target.value})} className="w-full bg-slate-800 rounded p-2 text-sm outline-none"><option value="">Paciente...</option>{atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}</select>
                <input type="datetime-local" value={novaSessao.dataHora} onChange={e=>setNovaSessao({...novaSessao, dataHora: e.target.value})} className="w-full bg-slate-800 rounded p-2 text-sm text-white" />
                <input type="text" placeholder="Link Zoom/Meet" value={novaSessao.link} onChange={e=>setNovaSessao({...novaSessao, link: e.target.value})} className="w-full bg-slate-800 rounded p-2 text-sm" />
                <button onClick={agendarSessao} className="w-full bg-white/10 py-3 rounded text-sm font-bold">Agendar</button>
              </div>
              <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3">
                {sessoes.map(s => {
                  const dS = new Date(s.dataHora);
                  const prox = dS > agora && dS <= limite48h;
                  return (
                    <div key={s.id} className={`p-4 rounded-xl border ${prox ? 'bg-red-500/10 border-red-500/50' : 'bg-slate-900/50 border-white/5'} group relative`}>
                      {prox && <span className="absolute -top-2 -right-2 flex h-4 w-4"><span className="animate-ping absolute h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative rounded-full h-4 w-4 bg-red-500"></span></span>}
                      <div className="flex justify-between"><p className="font-bold text-sm truncate pr-2">{s.nome || s.email.split('@')[0]}</p><button onClick={()=>apagarSessao(s.id)} className="text-red-400 opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0"><Icons.Trash /></button></div>
                      <p className={`text-xs ${prox ? 'text-red-400 font-bold' : 'text-slate-400'}`}>{dS.toLocaleString('pt-BR', {dateStyle: 'short', timeStyle: 'short'})}</p>
                      <a href={s.link} target="_blank" className="mt-3 block text-center text-xs bg-blue-600 py-2 rounded">Acessar Sala</a>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="glass-panel p-4 md:p-6 rounded-2xl flex flex-col h-auto lg:h-[650px]">
              <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><Icons.Calendar /> Torneios Atuais</h3>
              <div className="space-y-4">{torneios.map(t => (<div key={t.id} className="bg-slate-900 p-4 rounded-xl border-l-4 border-optic-yellow"><p className="font-bold text-lg">{t.nome}</p><p className="text-sm text-slate-400">{new Date(t.data).toLocaleDateString('pt-BR')}</p></div>))}</div>
            </div>
          </div>
        </div>
      );
    };

    // --- MÓDULO 6: RELATÓRIOS (PDF) ---
    const ModuloRelatorios = ({ atletas }) => {
      const [atletaId, setAtletaId] = useState("");
      const [objetivos, setObjetivos] = useState("");
      const [treinos, setTreinos] = useState("");
      const atletaObj = atletas.find(a => a.id === atletaId);
      const atletaNome = atletaObj?.nome || atletaObj?.email?.split('@')[0] || "Não selecionado";

      const gerarPDF = () => {
        if(!atletaId) return alert("Selecione um atleta.");
        const e = document.getElementById('relatorio-conteudo');
        window.html2pdf().set({ margin: 15, filename: `Relatorio_AceMind_${atletaNome}.pdf`, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(e).save();
      };

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-white/10 pb-4 gap-4">
            <h2 className="text-xl md:text-2xl font-light">Emissão de Relatórios (PDF)</h2>
            <button onClick={gerarPDF} className="w-full sm:w-auto bg-optic-yellow text-black px-6 py-3 rounded font-bold hover:bg-[#b3e600]">Baixar PDF</button>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div className="glass-panel p-4 md:p-6 rounded-2xl space-y-5">
              <select value={atletaId} onChange={e => setAtletaId(e.target.value)} className="w-full bg-slate-900 border border-white/20 rounded p-3 text-white outline-none"><option value="">Selecione o Atleta...</option>{atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}</select>
              <textarea value={treinos} onChange={e=>setTreinos(e.target.value)} className="w-full h-32 bg-slate-900 border border-white/10 rounded p-3 text-sm text-white" placeholder="Registro Clínico de Treinos (Curto Prazo)"></textarea>
              <textarea value={objetivos} onChange={e=>setObjetivos(e.target.value)} className="w-full h-32 bg-slate-900 border border-white/10 rounded p-3 text-sm text-white" placeholder="Objetivos Finais (Longo Prazo)"></textarea>
            </div>
            
            <div className="hidden lg:block bg-white text-black p-10 rounded-lg shadow-2xl overflow-y-auto h-[600px]">
              <div id="relatorio-conteudo" className="bg-white">
                <div className="border-b-4 border-black pb-4 mb-6"><h1 className="text-3xl font-black uppercase">Ace<span className="text-gray-400">Mind</span></h1><p className="text-sm">Relatório Clínico e Esportivo</p></div>
                <h2 className="text-xl font-bold mb-1">Paciente: {atletaNome}</h2>
                <p className="text-sm text-gray-500 mb-6">Data: {new Date().toLocaleDateString('pt-BR')}</p>
                <div className="mb-6"><h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">Treinos (Curto Prazo)</h3><p className="text-sm whitespace-pre-wrap">{treinos}</p></div>
                <div className="mb-6"><h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">Objetivos Finais (Longo Prazo)</h3><p className="text-sm whitespace-pre-wrap">{objetivos}</p></div>
              </div>
            </div>

            {/* Container invisível para gerar PDF em mobile */}
            <div className="lg:hidden absolute top-[-9999px] left-[-9999px]">
               <div id="relatorio-conteudo-mobile" className="bg-white text-black p-10 w-[800px]">
                <div className="border-b-4 border-black pb-4 mb-6"><h1 className="text-3xl font-black uppercase">Ace<span className="text-gray-400">Mind</span></h1><p className="text-sm">Relatório Confidencial</p></div>
                <h2 className="text-xl font-bold mb-1">Paciente: {atletaNome}</h2>
                <p className="text-sm text-gray-500 mb-6">Data: {new Date().toLocaleDateString('pt-BR')}</p>
                <div className="mb-6"><h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">Treinos (Curto Prazo)</h3><p className="text-sm whitespace-pre-wrap">{treinos}</p></div>
                <div className="mb-6"><h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">Objetivos Finais (Longo Prazo)</h3><p className="text-sm whitespace-pre-wrap">{objetivos}</p></div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // ROTEADOR DO PSICÓLOGO (MENU RESPONSIVO)
    // --------------------------------------------------
    const DashboardPsicologo = () => {
      const [abaAtiva, setAbaAtiva] = useState('dashboard');
      const [checkins, setCheckins] = useState([]);
      const [atletas, setAtletas] = useState([]);
      const [menuAberto, setMenuAberto] = useState(false);

      useEffect(() => {
        const carregarTudo = async () => {
          const qC = window.fbAPI.query(window.fbAPI.collection(window.db, "checkins"), window.fbAPI.orderBy("data", "desc"), window.fbAPI.limit(20));
          const snapC = await window.fbAPI.getDocs(qC);
          setCheckins(snapC.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          
          const qA = window.fbAPI.query(window.fbAPI.collection(window.db, "usuarios"), window.fbAPI.where("cargo", "==", "paciente"));
          const snapA = await window.fbAPI.getDocs(qA);
          setAtletas(snapA.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        };
        carregarTudo();
      }, []);

      const menuItems = [
        { id: 'dashboard', label: 'Visão Geral', icon: Icons.Dashboard },
        { id: 'perfil', label: 'Perfil Esportivo', icon: Icons.Profile },
        { id: 'prontuario', label: 'Prontuário (SOAP)', icon: Icons.Users },
        { id: 'criticos', label: 'Estatísticas do Jogo', icon: Icons.Crosshair },
        { id: 'agenda', label: 'Agenda & Torneios', icon: Icons.Calendar },
        { id: 'relatorios', label: 'Relatórios PDF', icon: Icons.Chart },
      ];

      const trocarAba = (id) => {
        setAbaAtiva(id);
        setMenuAberto(false);
      }

      return (
        <div className="flex h-[calc(100vh-64px)] bg-[#020617] relative w-full overflow-hidden">
          {menuAberto && <div className="fixed inset-0 bg-black/60 z-30 lg:hidden" onClick={() => setMenuAberto(false)}></div>}
          <aside className={`absolute lg:relative z-40 w-64 h-full glass-panel border-t-0 border-l-0 border-b-0 flex flex-col py-6 px-4 shrink-0 menu-transition bg-slate-950/95 lg:bg-transparent ${menuAberto ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="flex justify-between items-center mb-6 pl-3">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider">Módulos</div>
              <button onClick={() => setMenuAberto(false)} className="lg:hidden text-slate-400 hover:text-white p-1"><Icons.Close /></button>
            </div>
            <nav className="flex flex-col gap-2">
              {menuItems.map(item => (
                <button key={item.id} onClick={() => trocarAba(item.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${abaAtiva === item.id ? 'bg-optic-yellow text-black font-bold shadow-[0_0_15px_rgba(204,255,0,0.2)]' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                  <item.icon /><span className="text-sm">{item.label}</span>
                </button>
              ))}
            </nav>
          </aside>
          <main className="flex-1 overflow-y-auto p-4 sm:p-8 custom-scrollbar relative w-full">
            <button onClick={() => setMenuAberto(true)} className="lg:hidden mb-6 bg-white/5 p-2 rounded-lg text-white flex items-center gap-2 border border-white/10 hover:bg-white/10 transition">
              <Icons.Menu /> <span className="text-sm font-medium">Menu</span>
            </button>
            {abaAtiva === 'dashboard' && <ModuloDashboard checkins={checkins} />}
            {abaAtiva === 'perfil' && <ModuloPerfil atletas={atletas} />}
            {abaAtiva === 'prontuario' && <ModuloProntuario atletas={atletas} />}
            {abaAtiva === 'criticos' && <ModuloMomentosCriticos atletas={atletas} />}
            {abaAtiva === 'agenda' && <ModuloAgenda atletas={atletas} />}
            {abaAtiva === 'relatorios' && <ModuloRelatorios atletas={atletas} />}
          </main>
        </div>
      );
    };

    // --------------------------------------------------
    // AUTENTICAÇÃO COM NOME OBRIGATÓRIO
    // --------------------------------------------------
    const TelaAutenticacao = ({ setUsuarioLogado }) => {
      const [modo, setModo] = useState('login');
      const [nome, setNome] = useState('');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [cargo, setCargo] = useState('paciente');

      const handleAuth = async (e) => {
        e.preventDefault();
        try {
          if (modo === 'cadastro') {
            const cred = await window.fbAPI.createUserWithEmailAndPassword(window.auth, email, senha);
            await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "usuarios", cred.user.uid), { nome, email, cargo, dataCadastro: new Date().toISOString() });
            setUsuarioLogado({ ...cred.user, nome, cargo });
          } else {
            const cred = await window.fbAPI.signInWithEmailAndPassword(window.auth, email, senha);
            const docRef = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", cred.user.uid));
            const data = docRef.exists() ? docRef.data() : {};
            setUsuarioLogado({ ...cred.user, nome: data.nome || email.split('@')[0], cargo: data.cargo || 'paciente' });
          }
        } catch (err) { alert("Erro de acesso. Verifique dados ou chaves do Firebase."); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="glass-panel p-6 sm:p-8 rounded-2xl w-full max-w-md">
            <h1 className="text-4xl font-light tracking-wider text-center mb-6">Ace<span className="text-optic-yellow font-bold">Mind</span></h1>
            <div className="flex justify-between mb-8 border-b border-white/10 pb-2">
              <button onClick={() => setModo('login')} className={`flex-1 pb-2 ${modo === 'login' ? 'text-optic-yellow border-b-2 font-bold' : 'text-slate-500'}`}>Entrar</button>
              <button onClick={() => setModo('cadastro')} className={`flex-1 pb-2 ${modo === 'cadastro' ? 'text-optic-yellow border-b-2 font-bold' : 'text-slate-500'}`}>Criar Conta</button>
            </div>
            <form onSubmit={handleAuth} className="space-y-4">
              {modo === 'cadastro' && (
                <input type="text" placeholder="Nome Completo" value={nome} onChange={e=>setNome(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3 text-white" required />
              )}
              <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3 text-white" required />
              <input type="password" placeholder="Senha" value={senha} onChange={e=>setSenha(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3 text-white" required />
              {modo === 'cadastro' && (
                <select value={cargo} onChange={e=>setCargo(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3 text-white">
                  <option value="paciente">Atleta / Paciente</option><option value="psicologo">Psicólogo(a)</option>
                </select>
              )}
              <button type="submit" className="w-full bg-optic-yellow text-black font-bold p-3 rounded">Acessar Sistema</button>
            </form>
          </div>
        </div>
      );
    };

    const App = () => {
      const [usuarioLogado, setUsuarioLogado] = useState(null);
      const [carregando, setCarregando] = useState(true);

      useEffect(() => {
        const chk = setInterval(() => {
          if (window.firebasePronto && window.auth) {
            clearInterval(chk);
            window.fbAPI.onAuthStateChanged(window.auth, async (u) => {
              if (u) {
                try {
                  const d = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", u.uid));
                  const data = d.exists() ? d.data() : {};
                  setUsuarioLogado({ ...u, nome: data.nome || u.email.split('@')[0], cargo: data.cargo || 'paciente' });
                } catch(e) { setUsuarioLogado({...u, nome: u.email.split('@')[0], cargo: 'paciente'}); }
              } else { setUsuarioLogado(null); }
              setCarregando(false);
            });
          } else if (window.firebaseErro) { clearInterval(chk); setCarregando(false); alert("Erro Firebase"); }
        }, 100);
      }, []);

      if (carregando) return <div className="min-h-screen flex items-center justify-center text-optic-yellow text-xl sm:text-2xl">Carregando AceMind...</div>;
      if (!usuarioLogado) return <TelaAutenticacao setUsuarioLogado={setUsuarioLogado} />;

      return (
        <div className="h-screen flex flex-col overflow-hidden w-full">
          <div className="h-16 bg-slate-950 border-b border-white/10 flex justify-between items-center px-4 sm:px-6 shrink-0 z-50">
            <span className="font-bold text-lg sm:text-xl tracking-widest text-white">Ace<span className="text-optic-yellow">Mind</span></span>
            <div className="flex gap-4 items-center">
               {/* Usando o Nome no Topo */}
               <span className="text-sm font-medium text-slate-300 hidden sm:block">{usuarioLogado.nome}</span>
               <span className="text-[10px] sm:text-xs font-bold text-slate-400 bg-white/5 px-2 py-1 rounded uppercase border border-white/10">{usuarioLogado.cargo}</span>
               <button onClick={() => { window.fbAPI.signOut(window.auth); setUsuarioLogado(null); }} className="text-xs text-red-400 hover:text-red-300">Sair</button>
            </div>
          </div>
          {usuarioLogado.cargo === 'psicologo' || usuarioLogado.cargo === 'admin' ? <DashboardPsicologo /> : <MobileApp usuarioAtual={usuarioLogado} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
