    const calcularRisco = (foco, energia) => {
      if (foco <= 4 || energia <= 4) return { cor: 'bg-red-500', texto: 'Risco Alto', border: 'border-red-500/30', glow: 'shadow-glow-red' };
      if (foco <= 6 || energia <= 6) return { cor: 'bg-yellow-500', texto: 'Atenção', border: 'border-yellow-500/30', glow: 'shadow-[0_0_15px_rgba(234,179,8,0.5)]' };
      return { cor: 'bg-green-500', texto: 'Flow / Estável', border: 'border-green-500/30', glow: 'shadow-[0_0_15px_rgba(34,197,94,0.5)]' };
    };

    // ==============================================================================
    // APP DO PACIENTE (COM NAVEGAÇÃO HAMBÚRGUER E RELATO DE PARTIDA)
    // ==============================================================================
    const MobileApp = ({ usuarioAtual }) => {
      // Navegação
      const [abaAtiva, setAbaAtiva] = useState('home');
      const [menuAberto, setMenuAberto] = useState(false);

      // Estados: Diário Base e Funcionalidades
      const [foco, setFoco] = useState(5);
      const [energia, setEnergia] = useState(5);
      const [sono, setSono] = useState(5); 
      const [pontoForte, setPontoForte] = useState("");
      
      const [salvando, setSalvando] = useState(false);
      const [sosEnviado, setSosEnviado] = useState(false);
      const [rotinas, setRotinas] = useState({ pre: "Carregando...", pos: "Carregando..." });
      
      // Estados: Zone Reset
      const [respirando, setRespirando] = useState(false);
      const [faseRespiracao, setFaseRespiracao] = useState("INSPIRA");

      // Estados: Pré-Match Checklist
      const [checklist, setChecklist] = useState({ equipamento: false, hidratacao: false, visualizacao: false, tatica: false });
      const todosChecados = Object.values(checklist).every(v => v);

      // Estados: Visão de Túnel (Mantra)
      const [mantraAtivo, setMantraAtivo] = useState(false);
      const [meuMantra, setMeuMantra] = useState("EU CONTROLO O QUE POSSO CONTROLAR.");

      // Estados: Raio-X Express (Partida) - AGORA COM RELATO
      const [novaPartida, setNovaPartida] = useState({ torneio: "", resultado: "Vitória", nivelConfianca: 5, relato: "" });
      const [salvandoPartida, setSalvandoPartida] = useState(false);

      useEffect(() => {
        const fetchRotinas = async () => {
           const docSnap = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "prontuarios", usuarioAtual.uid));
           if(docSnap.exists() && docSnap.data().rotinas) { setRotinas(docSnap.data().rotinas); } 
           else { setRotinas({ pre: "Nenhuma rotina pré-saque definida.", pos: "Nenhuma rotina pós-erro definida." }); }
        };
        fetchRotinas();
      }, [usuarioAtual.uid]);

      useEffect(() => {
        let interval;
        if (respirando) {
          let step = 0; const fases = ["INSPIRA", "SEGURA", "EXPIRA", "PAUSA"]; setFaseRespiracao(fases[0]);
          interval = setInterval(() => { step = (step + 1) % 4; setFaseRespiracao(fases[step]); }, 4000); 
        }
        return () => clearInterval(interval);
      }, [respirando]);

      const salvarCheckin = async () => {
        setSalvando(true);
        try {
          await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "checkins"), {
            pacienteId: usuarioAtual.uid, nome: usuarioAtual.nome, email: usuarioAtual.email, 
            foco: parseInt(foco), energia: parseInt(energia), sono: parseInt(sono), pontoForte: pontoForte, data: new Date().toISOString()
          });
          alert("Diário enviado ao QG mental!");
          setFoco(5); setEnergia(5); setSono(5); setPontoForte("");
        } catch (error) { alert("Erro ao salvar."); }
        setSalvando(false);
      };

      const enviarRaioX = async () => {
        if(!novaPartida.torneio) return alert("Informe onde foi a partida.");
        setSalvandoPartida(true);
        try {
          await window.fbAPI.addDoc(window.fbAPI.collection(window.db, `prontuarios/${usuarioAtual.uid}/partidas`), { 
            torneio: novaPartida.torneio, resultado: novaPartida.resultado, nivelConfianca: novaPartida.nivelConfianca, 
            relato: novaPartida.relato, // Novo campo salvo
            dataRegistro: new Date().toISOString(), data: new Date().toISOString().split('T')[0]
          });
          alert("Raio-X enviado direto pro mentor!");
          setNovaPartida({ torneio: "", resultado: "Vitória", nivelConfianca: 5, relato: "" });
        } catch (e) { alert("Erro ao salvar partida."); }
        setSalvandoPartida(false);
      }

      const enviarSOS = async () => {
        if(confirm("ACIONAR S.O.S MENTAL: O psicólogo será notificado. Prosseguir?")) {
          try {
            await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "sos_alertas"), { pacienteId: usuarioAtual.uid, nome: usuarioAtual.nome, email: usuarioAtual.email, data: new Date().toISOString(), status: 'pendente' });
            setSosEnviado(true); setTimeout(() => setSosEnviado(false), 8000);
          } catch(e) { alert("Erro ao enviar SOS."); }
        }
      };

      const toggleCheck = (item) => setChecklist({...checklist, [item]: !checklist[item]});

      return (
        <div className="flex items-center justify-center min-h-[calc(100vh-64px)] p-0 sm:p-4 bg-black/40 relative">
          
          {/* MODO VISÃO DE TÚNEL (SOBREPOSIÇÃO MÁXIMA) */}
          {mantraAtivo && (
             <div className="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-8 animate-fade-in" onClick={() => setMantraAtivo(false)}>

      const [salvando, setSalvando] = useState(false);

        if(!atletaId) return;
        const carregar = async () => {
          const docSnap = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "prontuarios", atletaId));
          if (docSnap.exists() && docSnap.data().perfil) { setPerfil(docSnap.data().perfil); }
          else { setPerfil({ categoria: "", ranking: "", estilo: "", mao: "", lesoes: "" }); }

      }, [atletaId]);

      const salvarPerfil = async () => {
        setSalvando(true);
        await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "prontuarios", atletaId), { perfil }, { merge: true });
        setSalvando(false);
        alert("Ficha Esportiva atualizada com sucesso!");

          </header>

            <div className="glass-panel p-6 md:p-10 rounded-[2rem] grid grid-cols-1 md:grid-cols-2 gap-8 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-optic-yellow opacity-5 blur-[100px]"></div>
              
              <div className="space-y-5 z-10">
                <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Categoria</label><input type="text" value={perfil.categoria} onChange={e=>setPerfil({...perfil, categoria: e.target.value})} placeholder="Ex: ATP, ITF, Juvenil" /></div>
                <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Ranking Atual</label><input type="text" value={perfil.ranking} onChange={e=>setPerfil({...perfil, ranking: e.target.value})} className="!font-bold !text-optic-yellow" placeholder="Ex: #124 ATP" /></div>
                <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Mão Dominante</label><select value={perfil.mao} onChange={e=>setPerfil({...perfil, mao: e.target.value})}><option value="">Selecione...</option><option value="Destro">Destro</option><option value="Canhoto">Canhoto</option><option value="Ambidestro">Ambidestro</option></select></div>
              </div>
              
              <div className="space-y-5 z-10">
                <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Estilo de Jogo</label><input type="text" placeholder="Ex: Agressivo de Fundo, Saque e Voleio" value={perfil.estilo} onChange={e=>setPerfil({...perfil, estilo: e.target.value})} /></div>
                <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Histórico de Lesões Recentes</label><textarea value={perfil.lesoes} onChange={e=>setPerfil({...perfil, lesoes: e.target.value})} className="h-32 custom-scrollbar resize-none" placeholder="Relate cirurgias, dores crônicas, tendinites..."></textarea></div>
              </div>
              
              <div className="md:col-span-2 flex justify-end mt-4 z-10 border-t border-slate-700 pt-6">
                <button onClick={salvarPerfil} className="btn-primary w-full md:w-auto text-sm">{salvando ? 'Processando...' : 'Salvar Ficha Técnica'}</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ModuloProntuario = ({ atletas }) => {
      const [atletaSelecionadoId, setAtletaSelecionadoId] = useState("");
      const [rotinas, setRotinas] = useState({ pre: "", pos: "" });
      const [editandoRotina, setEditandoRotina] = useState(false);
      const [anotacoes, setAnotacoes] = useState([]);
      const [novaAnotacao, setNovaAnotacao] = useState("");
      const [editandoAnotacaoId, setEditandoAnotacaoId] = useState(null);
      const [videos, setVideos] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [progresso, setProgresso] = useState(0);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (!atletaSelecionadoId) return;
        const carregarProntuario = async (id) => {
          const docSnap = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "prontuarios", id));
          if (docSnap.exists()) { setRotinas(docSnap.data().rotinas || { pre: "", pos: "" }); } 
          else { setRotinas({ pre: "Definir rotina pré-saque.", pos: "Definir rotina pós-erro." }); }

          const qAnotacoes = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${id}/soap`), window.fbAPI.orderBy("data", "desc"));
          const snapAnot = await window.fbAPI.getDocs(qAnotacoes);
          setAnotacoes(snapAnot.docs.map(d => ({ id: d.id, ...d.data() })));

          const qVideos = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${id}/videos`), window.fbAPI.orderBy("dataEnvio", "desc"));
          const snapVideos = await window.fbAPI.getDocs(qVideos);
          setVideos(snapVideos.docs.map(d => ({ id: d.id, ...d.data() })));
        };
        carregarProntuario(atletaSelecionadoId);
      }, [atletaSelecionadoId]);

      const salvarRotinas = async () => {
        await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "prontuarios", atletaSelecionadoId), { rotinas }, { merge: true });
        setEditandoRotina(false);
      };

      const salvarAnotacao = async () => {
        if (!novaAnotacao.trim() || !atletaSelecionadoId) return;
        const soapRef = window.fbAPI.collection(window.db, `prontuarios/${atletaSelecionadoId}/soap`);
        if (editandoAnotacaoId) {
          await window.fbAPI.updateDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/soap`, editandoAnotacaoId), { texto: novaAnotacao, editadoEm: new Date().toISOString() });
        } else {
          await window.fbAPI.addDoc(soapRef, { texto: novaAnotacao, data: new Date().toISOString(), editadoEm: null });
        }
        setNovaAnotacao(""); setEditandoAnotacaoId(null);
        
        const qAnotacoes = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${atletaSelecionadoId}/soap`), window.fbAPI.orderBy("data", "desc"));
        const snapAnot = await window.fbAPI.getDocs(qAnotacoes);
        setAnotacoes(snapAnot.docs.map(d => ({ id: d.id, ...d.data() })));
      };

      const excluirAnotacao = async (id) => {
        if(confirm("Apagar permanentemente este registro SOAP?")) {
          await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/soap`, id));
          setAnotacoes(anotacoes.filter(a => a.id !== id));
        }
      };

      const handleVideoUpload = async (e) => {
        const file = e.target.files[0];
        if (!file || !atletaSelecionadoId) return;
        setUploading(true);
        const fileName = `video_${Date.now()}.${file.name.split('.').pop()}`;
        const storageRef = window.fbAPI.ref(window.storage, `atletas/${atletaSelecionadoId}/videos/${fileName}`);
        const uploadTask = window.fbAPI.uploadBytesResumable(storageRef, file);

        uploadTask.on('state_changed', 
          (snap) => setProgresso((snap.bytesTransferred / snap.totalBytes) * 100), 
          (err) => { setUploading(false); alert("Erro ao enviar vídeo."); }, 
          async () => {
            const url = await window.fbAPI.getDownloadURL(uploadTask.snapshot.ref);
            const newDoc = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, `prontuarios/${atletaSelecionadoId}/videos`), { url, nomeArquivo: file.name, dataEnvio: new Date().toISOString() });
            setVideos([{ id: newDoc.id, url, nomeArquivo: file.name, dataEnvio: new Date().toISOString() }, ...videos]);
            setUploading(false); setProgresso(0); fileInputRef.current.value = "";
          }
        );
      };

      const excluirVideo = async (video) => {
        if(confirm("Apagar vídeo?")) {
          try {
            await window.fbAPI.deleteObject(window.fbAPI.ref(window.storage, video.url));
            await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaSelecionadoId}/videos`, video.id));
            setVideos(videos.filter(v => v.id !== video.id));
          } catch(e) { alert("Erro ao apagar vídeo."); }
        }
      };

      return (
        <div className="space-y-8 animate-fade-in pb-10">
          <header className="border-b border-white/10 pb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <h2 className="text-3xl font-black tracking-tight text-white flex items-center gap-3"><Icons.Users /> Prontuário Clínico</h2>
              <p className="text-slate-400 text-sm mt-1">Registros SOAP, Rotinas e Linguagem Corporal.</p>
            </div>
            <select value={atletaSelecionadoId} onChange={e => setAtletaSelecionadoId(e.target.value)} className="sm:w-64 !font-bold !uppercase !tracking-widest !text-xs">
              <option value="">Selecione o Atleta...</option>
              {atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
            </select>
          </header>

          {!atletaSelecionadoId ? <div className="glass-panel p-12 text-center text-slate-500 rounded-[2rem] font-bold tracking-widest uppercase text-sm border-dashed border-white/20">Selecione um atleta no menu acima.</div> : (
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
              
              <div className="space-y-8 xl:col-span-1">
                <div className="glass-panel p-6 rounded-[2rem] border-t-4 border-t-optic-yellow">
                  <div className="flex justify-between items-center mb-6">
                    <h4 className="font-black uppercase tracking-wider text-lg text-white">Rotinas de Quadra</h4>
                    <button onClick={() => editandoRotina ? salvarRotinas() : setEditandoRotina(true)} className="text-[10px] font-black uppercase tracking-widest bg-white/5 hover:bg-optic-yellow hover:text-black transition-all px-3 py-1.5 rounded-lg border border-white/10">
                      {editandoRotina ? 'SALVAR' : 'EDITAR'}
                    </button>
                  </div>
                  <div className="space-y-5">
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Rotina Pré-Saque</label>
                      {editandoRotina ? <input type="text" value={rotinas.pre} onChange={e=>setRotinas({...rotinas, pre: e.target.value})} className="!py-2" /> : <div className="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-medium text-slate-300 break-words shadow-inner">{rotinas.pre}</div>}
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-2">Rotina Pós-Erro</label>
                      {editandoRotina ? <input type="text" value={rotinas.pos} onChange={e=>setRotinas({...rotinas, pos: e.target.value})} className="!py-2" /> : <div className="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm font-medium text-slate-300 break-words shadow-inner">{rotinas.pos}</div>}
                    </div>
                  </div>
                </div>

                <div className="glass-panel p-6 rounded-[2rem]">
                  <h4 className="font-black uppercase tracking-wider text-lg text-white mb-6 flex items-center gap-2"><Icons.Video /> Visão de Jogo</h4>
                  <div className="mb-6">
                    <input type="file" accept="video/mp4,video/quicktime" ref={fileInputRef} onChange={handleVideoUpload} className="hidden" id="video-upload" />
                    <label htmlFor="video-upload" className={`w-full h-24 rounded-2xl border-2 border-dashed transition-all duration-300 flex flex-col items-center justify-center cursor-pointer text-sm font-black uppercase tracking-widest ${uploading ? 'border-optic-yellow bg-optic-yellow/5' : 'border-slate-600 hover:border-optic-yellow hover:bg-white/5 text-slate-400 hover:text-white'}`}>
                      {uploading ? <span className="text-optic-yellow">Enviando... {Math.round(progresso)}%</span> : '+ Anexar Vídeo'}
                    </label>
                    {uploading && <div className="w-full bg-slate-800 h-1.5 mt-3 rounded-full overflow-hidden shadow-inner"><div className="bg-optic-yellow h-full transition-all duration-300 shadow-glow-yellow" style={{width: `${progresso}%`}}></div></div>}
                  </div>
                  <div className="space-y-4 max-h-[350px] overflow-y-auto custom-scrollbar pr-2">
                    {videos.map(v => (
                      <div key={v.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-700 group hover:border-optic-yellow/50 transition-all shadow-lg">
                        <div className="flex justify-between items-start mb-3">
                          <p className="text-xs font-bold uppercase tracking-wide text-slate-300 truncate max-w-[150px]">{v.nomeArquivo}</p>
                          <button onClick={() => excluirVideo(v)} className="text-slate-600 hover:text-red-500 transition-colors bg-white/5 p-1.5 rounded-lg"><Icons.Trash /></button>
                        </div>
                        <video src={v.url} controls className="w-full rounded-xl bg-black border border-white/5 max-h-[140px] object-cover shadow-inner"></video>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="xl:col-span-2 glass-panel p-6 md:p-8 rounded-[2rem] flex flex-col h-[700px] md:h-[800px]">
                <h4 className="font-black text-xl text-white mb-6 uppercase tracking-wider">Registro Evolutivo (SOAP)</h4>
                
                <div className="bg-slate-900 p-5 rounded-2xl mb-8 flex-shrink-0 border border-slate-700 focus-within:border-optic-yellow/50 transition-colors shadow-inner">
                  <textarea value={novaAnotacao} onChange={e=>setNovaAnotacao(e.target.value)} placeholder="S: Subjetivo (O que o atleta relata)&#10;O: Objetivo (O que foi observado)&#10;A: Avaliação (Sua análise)&#10;P: Plano (Próximos passos)" className="w-full h-32 bg-transparent outline-none resize-none text-sm font-medium text-slate-200 placeholder:text-slate-600 custom-scrollbar"></textarea>
                  <div className="flex justify-between items-center mt-4 border-t border-slate-700 pt-4">
                    <span className="text-[10px] text-optic-yellow font-black uppercase tracking-widest">{editandoAnotacaoId ? '🔧 Modo de Edição' : '📝 Novo Registro'}</span>
                    <div className="flex gap-3">
                       {editandoAnotacaoId && <button onClick={() => {setNovaAnotacao(''); setEditandoAnotacaoId(null);}} className="btn-secondary !py-2 !px-4 !text-xs">Cancelar</button>}
                       <button onClick={salvarAnotacao} className="btn-primary !py-2 !px-6 !text-xs">{editandoAnotacaoId ? 'Atualizar SOAP' : 'Salvar Registro'}</button>
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto space-y-5 custom-scrollbar pr-3">
                  {anotacoes.length === 0 && <p className="text-center text-slate-500 font-bold uppercase tracking-widest text-xs mt-10">Nenhum registro clínico.</p>}
                  {anotacoes.map(a => (
                    <div key={a.id} className="bg-slate-900/80 p-6 rounded-2xl border border-slate-700 group hover:border-slate-500 hover:-translate-y-1 transition-all duration-300 shadow-lg">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-4 border-b border-slate-700 pb-3 gap-2">
                        <div>
                          <span className="text-[11px] text-optic-yellow font-black uppercase tracking-widest bg-optic-yellow/10 px-3 py-1.5 rounded-lg border border-optic-yellow/20">{new Date(a.data).toLocaleString('pt-BR', {day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                          {a.editadoEm && <span className="text-[10px] text-slate-500 sm:ml-3 block sm:inline mt-2 sm:mt-0 font-bold uppercase tracking-wider">(Editado)</span>}
                        </div>
                        <div className="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                          <button onClick={() => {setNovaAnotacao(a.texto); setEditandoAnotacaoId(a.id);}} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500/20 p-2 rounded-lg transition" title="Editar"><Icons.Edit /></button>
                          <button onClick={() => excluirAnotacao(a.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500/20 p-2 rounded-lg transition" title="Excluir"><Icons.Trash /></button>
                        </div>
                      </div>
                      <p className="text-sm font-medium text-slate-300 whitespace-pre-wrap break-words text-justify w-full leading-relaxed">{a.texto}</p>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          )}
        </div>
      );
    };

    const ModuloMomentosCriticos = ({ atletas }) => {
      const [atletaId, setAtletaId] = useState("");
      const [partidas, setPartidas] = useState([]);
      // Modificado para suportar o relato
      const [novaPartida, setNovaPartida] = useState({ torneio: "", data: "", resultado: "Vitória", breakPointsSalvos: "", duplasFaltas: "", errosNaoForcados: "", nivelConfianca: "", relato: "" });
      const [salvando, setSalvando] = useState(false);

      useEffect(() => {
        if (!atletaId) return;
        const carregarPartidas = async () => {
          const q = window.fbAPI.query(window.fbAPI.collection(window.db, `prontuarios/${atletaId}/partidas`), window.fbAPI.orderBy("dataRegistro", "desc"));
          const snap = await window.fbAPI.getDocs(q);
          setPartidas(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        };
        carregarPartidas();
      }, [atletaId]);

      const registrarPartida = async () => {
        if (!novaPartida.torneio) return alert("Preencha o Torneio.");
        setSalvando(true);
        try {
          const docRef = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, `prontuarios/${atletaId}/partidas`), { ...novaPartida, data: novaPartida.data || new Date().toISOString().split('T')[0], dataRegistro: new Date().toISOString() });
          setPartidas([{ id: docRef.id, ...novaPartida, dataRegistro: new Date().toISOString() }, ...partidas].sort((a,b) => new Date(b.dataRegistro) - new Date(a.dataRegistro)));
          setNovaPartida({ torneio: "", data: "", resultado: "Vitória", breakPointsSalvos: "", duplasFaltas: "", errosNaoForcados: "", nivelConfianca: "", relato: "" });
        } catch (e) { alert("Erro ao salvar."); }
        setSalvando(false);
      };

      const apagarPartida = async (id) => {
        if(confirm("Apagar estatística da partida?")) {
          await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, `prontuarios/${atletaId}/partidas`, id));
          setPartidas(partidas.filter(p => p.id !== id));
        }
      };

      return (
        <div className="space-y-8 animate-fade-in pb-10">
          <header className="border-b border-white/10 pb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <h2 className="text-3xl font-black tracking-tight text-white flex items-center gap-3"><Icons.Crosshair /> Pressão em Jogo</h2>
              <p className="text-slate-400 text-sm mt-1">Análise de *Choking*, métricas e relatos de momentos críticos.</p>
            </div>
            <select value={atletaId} onChange={e => setAtletaId(e.target.value)} className="sm:w-64 !font-bold !uppercase !tracking-widest !text-xs">
              <option value="">Selecione o Atleta...</option>
              {atletas.map(a => <option key={a.id} value={a.id}>{a.nome}</option>)}
            </select>
          </header>
          
          {!atletaId ? <div className="glass-panel p-12 text-center text-slate-500 rounded-[2rem] font-bold tracking-widest uppercase text-sm border-dashed border-white/20">Selecione um atleta no menu acima.</div> : (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              <div className="lg:col-span-1 glass-panel p-6 md:p-8 rounded-[2rem] space-y-6 h-fit border-t-4 border-t-optic-yellow shadow-panel">
                <h3 className="font-black text-xl text-white uppercase tracking-wider mb-2">Lançar Partida</h3>
                
                <div className="space-y-4">
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Torneio / Fase</label><input type="text" placeholder="Ex: US Open - QF" value={novaPartida.torneio} onChange={e=>setNovaPartida({...novaPartida, torneio: e.target.value})} className="!py-2 !text-sm" /></div>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Data</label><input type="date" value={novaPartida.data} onChange={e=>setNovaPartida({...novaPartida, data: e.target.value})} className="!py-2 !text-sm" /></div>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Desfecho</label><select value={novaPartida.resultado} onChange={e=>setNovaPartida({...novaPartida, resultado: e.target.value})} className="!py-2 !text-sm !font-black !uppercase !tracking-widest"><option value="Vitória">🏆 Vitória</option><option value="Derrota">❌ Derrota</option></select></div>
                </div>

                <div className="pt-6 border-t border-slate-700 mt-6 space-y-4">
                  <h4 className="text-[11px] font-black text-optic-yellow uppercase tracking-widest bg-optic-yellow/10 p-2 rounded-lg text-center border border-optic-yellow/20">Métricas Sob Pressão</h4>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Nível de Confiança / Gelo (1 a 10)</label><input type="number" placeholder="1 a 10" value={novaPartida.nivelConfianca} onChange={e=>setNovaPartida({...novaPartida, nivelConfianca: e.target.value})} className="!py-2 !text-sm !font-mono" /></div>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Break Points Salvos (%)</label><input type="number" placeholder="0 a 100" value={novaPartida.breakPointsSalvos} onChange={e=>setNovaPartida({...novaPartida, breakPointsSalvos: e.target.value})} className="!py-2 !text-sm !font-mono" /></div>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Duplas Faltas (Em BP/Vant)</label><input type="number" placeholder="Quantidade" value={novaPartida.duplasFaltas} onChange={e=>setNovaPartida({...novaPartida, duplasFaltas: e.target.value})} className="!py-2 !text-sm !font-mono" /></div>
                  <div><label className="text-[10px] text-slate-400 font-bold uppercase tracking-widest block mb-2">Erros Não Forçados (Tie-Break)</label><input type="number" placeholder="Quantidade" value={novaPartida.errosNaoForcados} onChange={e=>setNovaPartida({...novaPartida, errosNaoForcados: e.target.value})} className="!py-2 !text-sm !font-mono" /></div>
                </div>

                <button onClick={registrarPartida} disabled={salvando} className="btn-primary w-full mt-6 text-sm">{salvando ? 'Computando...' : 'Gravar Estatística'}</button>
              </div>
              
              <div className="lg:col-span-2 glass-panel p-6 md:p-8 rounded-[2rem] flex flex-col h-[700px] md:h-[800px] bg-slate-950/90 border-slate-800 relative overflow-hidden shadow-2xl">
                <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-court-blue opacity-10 rounded-full blur-[120px] pointer-events-none"></div>

                <h3 className="text-xl font-black mb-6 text-white uppercase tracking-wider flex items-center gap-3"><span className="w-2 h-6 bg-optic-yellow inline-block rounded-full shadow-glow-yellow"></span> Match History</h3>
                
                <div className="grid grid-cols-3 gap-3 md:gap-6 mb-8 shrink-0">
                  <div className="bg-slate-900 border border-slate-700 p-4 rounded-2xl text-center shadow-inner relative overflow-hidden">
                     <p className="text-[10px] md:text-[11px] text-slate-400 font-black uppercase tracking-[0.2em] relative z-10">Total Jogos</p>
                     <p className="text-3xl md:text-5xl font-black text-white mt-2 relative z-10 font-mono tracking-tighter">{partidas.length}</p>
                  </div>
                  <div className="bg-slate-900 border border-green-900/50 p-4 rounded-2xl text-center shadow-inner relative overflow-hidden group hover:border-green-500/50 transition-colors">

    const ModuloAgenda = ({ atletas }) => {
      const [sessoes, setSessoes] = useState([]);
      const [novaSessao, setNovaSessao] = useState({ atletaId: "", dataHora: "", link: "" });
      const [sessaoEditandoId, setSessaoEditandoId] = useState(null);
      
      const [torneios, setTorneios] = useState([]);
      const [novoTorneio, setNovoTorneio] = useState({ nome: "", data: "" });
      const [torneioEditandoId, setTorneioEditandoId] = useState(null);

      const agora = new Date();
      const limite48h = new Date(agora.getTime() + (48 * 60 * 60 * 1000));

      useEffect(() => {
        const carregar = async () => {
          const qS = window.fbAPI.query(window.fbAPI.collection(window.db, "agenda"), window.fbAPI.orderBy("dataHora", "asc"));
          const snapS = await window.fbAPI.getDocs(qS);
          setSessoes(snapS.docs.map(d => ({ id: d.id, ...d.data() })));

          const qT = window.fbAPI.query(window.fbAPI.collection(window.db, "torneios"), window.fbAPI.orderBy("data", "asc"));
          const snapT = await window.fbAPI.getDocs(qT);
          setTorneios(snapT.docs.map(d => ({ id: d.id, ...d.data() })));
        };
        carregar();
      }, []);

      const salvarSessao = async () => {
        if(!novaSessao.atletaId || !novaSessao.dataHora) return alert("Preencha Paciente e Data.");
        const atleta = atletas.find(a => a.id === novaSessao.atletaId);
        const linkGerado = novaSessao.link || `https://meet.google.com/acemind-${Math.floor(Math.random()*1000)}`;
        const sessaoData = { atletaId: atleta.id, nome: atleta.nome, email: atleta.email, dataHora: novaSessao.dataHora, link: linkGerado };

        if (sessaoEditandoId) {
          await window.fbAPI.updateDoc(window.fbAPI.doc(window.db, "agenda", sessaoEditandoId), sessaoData);
          setSessoes(sessoes.map(s => s.id === sessaoEditandoId ? { id: sessaoEditandoId, ...sessaoData } : s).sort((a,b) => new Date(a.dataHora) - new Date(b.dataHora)));
          setSessaoEditandoId(null);
        } else {
          const docRef = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "agenda"), sessaoData);
          setSessoes([...sessoes, { id: docRef.id, ...sessaoData }].sort((a,b) => new Date(a.dataHora) - new Date(b.dataHora)));
        }
        setNovaSessao({ atletaId: "", dataHora: "", link: "" });

      const apagarSessao = async (id) => { if(confirm("Desmarcar sessão?")) { await window.fbAPI.deleteDoc(window.fbAPI.doc(window.db, "agenda", id)); setSessoes(sessoes.filter(s => s.id !== id)); } };

      const salvarTorneio = async () => {
        if(!novoTorneio.nome || !novoTorneio.data) return alert("Preencha Nome e Data.");
        if (torneioEditandoId) {
          await window.fbAPI.updateDoc(window.fbAPI.doc(window.db, "torneios", torneioEditandoId), novoTorneio);
          setTorneios(torneios.map(t => t.id === torneioEditandoId ? { id: torneioEditandoId, ...novoTorneio } : t).sort((a,b) => new Date(a.data) - new Date(b.data)));
          setTorneioEditandoId(null);
        } else {
          const docRef = await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "torneios"), novoTorneio);
          setTorneios([...torneios, { id: docRef.id, ...novoTorneio }].sort((a,b) => new Date(a.data) - new Date(b.data)));
        }
        setNovoTorneio({ nome: "", data: "" });
      };

      const editarTorneio = (torneio) => { setNovoTorneio({ nome: torneio.nome, data: torneio.data }); setTorneioEditandoId(torneio.id); };

              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-4">
                {sessoes.map(s => {
                  const dS = new Date(s.dataHora);
                  const prox = dS > agora && dS <= limite48h;
                  return (
                    <div key={s.id} className={`p-5 rounded-2xl border transition-all duration-300 ${prox ? 'bg-red-950/40 border-red-500/50 shadow-[0_0_20px_rgba(239,68,68,0.15)]' : 'bg-slate-900 border-slate-700 hover:border-slate-500'} group relative shadow-lg`}>
                      {prox && <span className="absolute -top-1.5 -right-1.5 flex h-4 w-4"><span className="animate-ping absolute h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative rounded-full h-4 w-4 bg-red-500 shadow-glow-red"></span></span>}
                      <div className="flex justify-between items-start mb-3">
                        <div>
                           <p className="font-black text-lg text-white truncate uppercase tracking-wide">{s.nome || s.email.split('@')[0]}</p>
                           <p className={`text-[11px] font-bold uppercase tracking-widest mt-1 ${prox ? 'text-red-400' : 'text-slate-400'}`}>{dS.toLocaleString('pt-BR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                        <div className="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                          <button onClick={()=>editarSessao(s)} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500/20 p-2 rounded-lg transition"><Icons.Edit /></button>
                          <button onClick={()=>apagarSessao(s.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500/20 p-2 rounded-lg transition"><Icons.Trash /></button>
                        </div>
                      </div>
                      <a href={s.link} target="_blank" className="mt-4 flex items-center justify-center gap-2 text-[11px] font-black uppercase tracking-widest bg-blue-600 text-white border border-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.4)] hover:bg-blue-500 transition-all py-3 rounded-xl hover:scale-[0.98]">Entrar na Sala Virtual</a>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="glass-panel p-6 md:p-8 rounded-[2rem] flex flex-col h-[700px] shadow-panel">
              <h3 className="text-xl font-black text-white mb-6 uppercase tracking-wider">Radar de Torneios</h3>
              
              <div className="bg-slate-900 border border-slate-700 p-5 rounded-2xl mb-8 space-y-4 shrink-0 shadow-inner">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-[11px] font-black uppercase tracking-widest text-slate-300">{torneioEditandoId ? '🔧 Editando Torneio' : 'Adicionar ao Radar'}</span>
                  {torneioEditandoId && <button onClick={() => {setTorneioEditandoId(null); setNovoTorneio({ nome: "", data: "" });}} className="text-[10px] text-optic-yellow font-bold uppercase tracking-widest hover:underline">Cancelar</button>}
                </div>
                <input type="text" placeholder="Nome do Torneio (Ex: US Open)" value={novoTorneio.nome} onChange={e=>setNovoTorneio({...novoTorneio, nome: e.target.value})} className="!py-2 !text-sm" />
                <input type="date" value={novoTorneio.data} onChange={e=>setNovoTorneio({...novoTorneio, data: e.target.value})} className="!py-2 !text-sm" />
                <button onClick={salvarTorneio} className="btn-secondary w-full text-xs">{torneioEditandoId ? 'Salvar Edição' : 'Registrar Competição'}</button>
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-4">
                {torneios.length === 0 && <p className="text-[11px] font-bold uppercase tracking-widest text-slate-500 text-center mt-10">Nenhum evento mapeado.</p>}
                {torneios.map(t => (
                  <div key={t.id} className="bg-slate-900 p-5 rounded-2xl border-l-4 border-optic-yellow border-y border-r border-slate-700 group flex justify-between items-center hover:bg-slate-800 transition-colors shadow-lg">
                    <div>
                      <p className="font-black text-lg text-white uppercase tracking-wide">{t.nome}</p>
                      <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mt-1">Início: {new Date(t.data + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                    </div>
                    <div className="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                      <button onClick={()=>editarTorneio(t)} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500/20 p-2 rounded-lg transition"><Icons.Edit /></button>
                      <button onClick={()=>apagarTorneio(t.id)} className="text-red-400 bg-red-500/10 hover:bg-red-500/20 p-2 rounded-lg transition"><Icons.Trash /></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      const [abaAtiva, setAbaAtiva] = useState('dashboard');
      const [checkins, setCheckins] = useState([]);
      const [atletas, setAtletas] = useState([]);
      const [alertasSOS, setAlertasSOS] = useState([]);
      const [menuAberto, setMenuAberto] = useState(false);

      useEffect(() => {
        const carregarTudo = async () => {
          const qC = window.fbAPI.query(window.fbAPI.collection(window.db, "checkins"), window.fbAPI.orderBy("data", "desc"), window.fbAPI.limit(20));
          const snapC = await window.fbAPI.getDocs(qC);
          setCheckins(snapC.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          
          const qA = window.fbAPI.query(window.fbAPI.collection(window.db, "usuarios"), window.fbAPI.where("cargo", "==", "paciente"));
          const snapA = await window.fbAPI.getDocs(qA);
          setAtletas(snapA.docs.map(doc => ({ id: doc.id, ...doc.data() })));

          const qSOS = window.fbAPI.query(window.fbAPI.collection(window.db, "sos_alertas"), window.fbAPI.where("status", "==", "pendente"));
          const snapSOS = await window.fbAPI.getDocs(qSOS);
          setAlertasSOS(snapSOS.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        };
        carregarTudo();
        const intervalo = setInterval(carregarTudo, 30000); 
        return () => clearInterval(intervalo);
      }, []);

      const resolverSOS = async (id) => {
        await window.fbAPI.updateDoc(window.fbAPI.doc(window.db, "sos_alertas", id), { status: 'resolvido' });
        setAlertasSOS(alertasSOS.filter(a => a.id !== id));
      };

      const menuItems = [
        { id: 'dashboard', label: 'Visão Geral', icon: Icons.Dashboard },
        { id: 'perfil', label: 'Perfil Esportivo', icon: Icons.Profile },
        { id: 'prontuario', label: 'Prontuário Clínico', icon: Icons.Users },
        { id: 'criticos', label: 'Pressão em Jogo', icon: Icons.Crosshair },
        { id: 'agenda', label: 'Calendário ATP', icon: Icons.Calendar },
        { id: 'relatorios', label: 'Exportar PDF', icon: Icons.Chart },
      ];

      const trocarAba = (id) => { setAbaAtiva(id); setMenuAberto(false); }

      return (
        <div className="flex flex-col h-[calc(100vh-72px)] w-full overflow-hidden">
          
          {alertasSOS.length > 0 && (
            <div className="w-full bg-red-600 text-white font-black uppercase tracking-wider p-4 text-sm flex flex-col sm:flex-row justify-between items-center gap-4 z-50 shadow-[0_10px_30px_rgba(239,68,68,0.4)] shrink-0 sos-alert">
              <div className="flex items-center gap-3">
                <Icons.Warning />
                <span><span className="text-red-200">EMERGÊNCIA S.O.S:</span> {alertasSOS[0].nome} precisa de apoio!</span>
              </div>
              <button onClick={() => resolverSOS(alertasSOS[0].id)} className="btn-secondary !bg-black/30 !border-white/20 hover:!bg-black/50 py-2 text-xs">Encerrar Alerta</button>
            </div>
          )}

          <div className="flex flex-1 relative w-full overflow-hidden">
            {menuAberto && <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-30 lg:hidden" onClick={() => setMenuAberto(false)}></div>}
            
            <aside className={`absolute lg:relative z-40 w-72 h-full glass-panel border-t-0 border-l-0 border-b-0 flex flex-col py-8 px-5 shrink-0 menu-transition bg-slate-950/95 lg:bg-transparent ${menuAberto ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'} shadow-2xl lg:shadow-none`}>
              <div className="flex justify-between items-center mb-8 pl-4">
                <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Painel de Controle</div>
                <button onClick={() => setMenuAberto(false)} className="lg:hidden text-slate-400 hover:text-white p-2 bg-white/5 rounded-lg"><Icons.Close /></button>
              </div>
              <nav className="flex flex-col gap-3">
                {menuItems.map(item => (
                  <button key={item.id} onClick={() => trocarAba(item.id)} className={`flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 font-black text-sm tracking-widest uppercase ${abaAtiva === item.id ? 'bg-optic-yellow text-slate-950 shadow-glow-yellow translate-x-2' : 'text-slate-400 hover:bg-slate-800 hover:text-white hover:translate-x-1'}`}>
                    <item.icon /><span>{item.label}</span>
                  </button>
                ))}
              </nav>
            </aside>
            
            <main className="flex-1 overflow-y-auto p-4 sm:p-10 custom-scrollbar relative w-full">
              <button onClick={() => setMenuAberto(true)} className="lg:hidden mb-8 btn-secondary py-3 px-5 text-xs w-full sm:w-auto">
                <Icons.Menu /> <span>Menu do Sistema</span>
              </button>
              {abaAtiva === 'dashboard' && <ModuloDashboard checkins={checkins} />}
              {abaAtiva === 'perfil' && <ModuloPerfil atletas={atletas} />}
              {abaAtiva === 'prontuario' && <ModuloProntuario atletas={atletas} />}
              {abaAtiva === 'criticos' && <ModuloMomentosCriticos atletas={atletas} />}
              {abaAtiva === 'agenda' && <ModuloAgenda atletas={atletas} />}
              {abaAtiva === 'relatorios' && <ModuloRelatorios atletas={atletas} />}
            </main>
          </div>
        </div>
      );
    };

    const TelaAutenticacao = ({ setUsuarioLogado }) => {
      const [modo, setModo] = useState('login');
      const [nome, setNome] = useState('');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [cargo, setCargo] = useState('paciente');

      const handleAuth = async (e) => {
        e.preventDefault();
        try {
          if (modo === 'cadastro') {
            const cred = await window.fbAPI.createUserWithEmailAndPassword(window.auth, email, senha);
            await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "usuarios", cred.user.uid), { nome, email, cargo, dataCadastro: new Date().toISOString() });
            setUsuarioLogado({ ...cred.user, nome, cargo });
          } else {
            const cred = await window.fbAPI.signInWithEmailAndPassword(window.auth, email, senha);
            const docRef = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", cred.user.uid));
            const data = docRef.exists() ? docRef.data() : {};
            setUsuarioLogado({ ...cred.user, nome: data.nome || email.split('@')[0], cargo: data.cargo || 'paciente' });
          }
        } catch (err) { alert("Credenciais inválidas ou erro no Firebase."); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative">
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-optic-yellow opacity-10 rounded-full blur-[150px] pointer-events-none"></div>
          <div className="glass-panel p-8 sm:p-12 rounded-[2.5rem] w-full max-w-md relative z-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-t-white/20 border-l-white/20">
            <h1 className="text-5xl font-black tracking-tighter text-center mb-2 uppercase">Ace<span className="text-optic-yellow">Mind</span></h1>
            <p className="text-center text-slate-400 text-[10px] font-black tracking-[0.3em] uppercase mb-10">High Performance Lab</p>
            
            <div className="flex bg-slate-900 rounded-xl p-1 mb-8 border border-slate-700 shadow-inner">
              <button onClick={() => setModo('login')} className={`flex-1 py-3 rounded-lg text-[11px] font-black uppercase tracking-widest transition-all duration-300 ${modo === 'login' ? 'bg-optic-yellow text-slate-900 shadow-glow-yellow' : 'text-slate-500 hover:text-white'}`}>Acessar</button>
              <button onClick={() => setModo('cadastro')} className={`flex-1 py-3 rounded-lg text-[11px] font-black uppercase tracking-widest transition-all duration-300 ${modo === 'cadastro' ? 'bg-optic-yellow text-slate-900 shadow-glow-yellow' : 'text-slate-500 hover:text-white'}`}>Novo Registro</button>
            </div>

            <form onSubmit={handleAuth} className="space-y-5">
              {modo === 'cadastro' && <input type="text" placeholder="Nome Completo" value={nome} onChange={e=>setNome(e.target.value)} className="!font-medium !text-sm" required />}
              <input type="email" placeholder="E-mail Institucional" value={email} onChange={e=>setEmail(e.target.value)} className="!font-medium !text-sm" required />
              <input type="password" placeholder="Senha de Acesso" value={senha} onChange={e=>setSenha(e.target.value)} className="!font-medium !text-sm" required />
              {modo === 'cadastro' && (
                <select value={cargo} onChange={e=>setCargo(e.target.value)} className="!font-bold !uppercase !tracking-widest !text-xs">
                  <option value="paciente">Atleta / Paciente</option>
                  <option value="psicologo">Equipe AceMind (Psicólogo)</option>
                </select>
              )}
              <button type="submit" className="btn-primary w-full mt-6 py-4 text-sm">Entrar na Quadra</button>
            </form>
          </div>
        </div>
      );
    };

    const App = () => {
      const [usuarioLogado, setUsuarioLogado] = useState(null);
      const [carregando, setCarregando] = useState(true);

      useEffect(() => {
        const chk = setInterval(() => {
          if (window.firebasePronto && window.auth) {
            clearInterval(chk);
            window.fbAPI.onAuthStateChanged(window.auth, async (u) => {
              if (u) {
                try {
                  const d = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", u.uid));
                  const data = d.exists() ? d.data() : {};
                  setUsuarioLogado({ ...u, nome: data.nome || u.email.split('@')[0], cargo: data.cargo || 'paciente' });
                } catch(e) { setUsuarioLogado({...u, nome: u.email.split('@')[0], cargo: 'paciente'}); }
              } else { setUsuarioLogado(null); }
              setCarregando(false);
            });
          } else if (window.firebaseErro) { clearInterval(chk); setCarregando(false); alert("Erro de conexão Firebase."); }
        }, 100);
      }, []);

      if (carregando) return <div className="min-h-screen flex items-center justify-center text-optic-yellow text-xl sm:text-2xl font-black uppercase tracking-widest animate-pulse">Carregando Motor AceMind...</div>;
      if (!usuarioLogado) return <TelaAutenticacao setUsuarioLogado={setUsuarioLogado} />;

      return (
        <div className="h-screen flex flex-col overflow-hidden w-full font-sans text-white relative">
          <div className="h-18 bg-slate-950/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 sm:px-10 shrink-0 z-50 py-4 shadow-xl">
            <span className="font-black text-2xl tracking-tighter text-white uppercase flex items-center gap-2">Ace<span className="text-optic-yellow">Mind</span></span>
            <div className="flex gap-5 items-center">
               <div className="text-right hidden sm:block">
                 <span className="text-sm font-black uppercase tracking-wide text-white block">{usuarioLogado.nome}</span>
                 <span className="text-[9px] font-black text-optic-yellow uppercase tracking-[0.2em]">{usuarioLogado.cargo}</span>
               </div>
               <div className="w-[1px] h-8 bg-slate-700 hidden sm:block"></div>
               <button onClick={() => { window.fbAPI.signOut(window.auth); setUsuarioLogado(null); }} className="btn-danger !py-2 !px-4 !text-[10px] !bg-slate-900/50 hover:!bg-red-950 hover:!border-red-500/50">Logout</button>
            </div>
          </div>
          {usuarioLogado.cargo === 'psicologo' || usuarioLogado.cargo === 'admin' ? <DashboardPsicologo /> : <MobileApp usuarioAtual={usuarioLogado} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
