<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceMind - Psicologia do Tênis</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { 'optic-yellow': '#ccff00' } } } }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: white; font-family: sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // =========================================================================
    // COLE SUAS CHAVES AQUI
    // =========================================================================
    const firebaseConfig = {
     apiKey: "AIzaSyA-Wkrh3xZc-V0snzsjvg4i9ffxWCKyu0M",
  authDomain: "ace-mind-c13a1.firebaseapp.com",
  projectId: "ace-mind-c13a1",
  storageBucket: "ace-mind-c13a1.firebasestorage.app",
  messagingSenderId: "22508213575",
  appId: "1:22508213575:web:a7a38ac233b893f992e862"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.auth = getAuth(app);
    
    window.fbAPI = { 
      collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc,
      signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut 
    };
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --------------------------------------------------
    // TELA 1: LOGIN E CADASTRO
    // --------------------------------------------------
    const TelaAutenticacao = ({ setUsuarioLogado }) => {
      const [modo, setModo] = useState('login'); // 'login' ou 'cadastro'
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [cargo, setCargo] = useState('paciente'); // paciente, psicologo, admin
      const [erro, setErro] = useState('');
      const [carregando, setCarregando] = useState(false);

      const processarAuth = async (e) => {
        e.preventDefault();
        setCarregando(true);
        setErro('');
        
        try {
          let userCredential;
          if (modo === 'cadastro') {
            // Cria usuário na aba de autenticação do Firebase
            userCredential = await window.fbAPI.createUserWithEmailAndPassword(window.auth, email, senha);
            
            // Salva o cargo na tabela 'usuarios' do Banco de Dados
            await window.fbAPI.setDoc(window.fbAPI.doc(window.db, "usuarios", userCredential.user.uid), {
              email: email,
              cargo: cargo,
              dataCadastro: new Date().toISOString()
            });
            
            setUsuarioLogado({ ...userCredential.user, cargo: cargo });
          } else {
            // Faz login
            userCredential = await window.fbAPI.signInWithEmailAndPassword(window.auth, email, senha);
            
            // Busca o cargo do cara no banco
            const userDoc = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", userCredential.user.uid));
            const cargoBanco = userDoc.exists() ? userDoc.data().cargo : 'paciente'; // Se não tiver, assume paciente
            
            setUsuarioLogado({ ...userCredential.user, cargo: cargoBanco });
          }
        } catch (error) {
          setErro(modo === 'login' ? 'Dados inválidos.' : 'Erro ao criar conta. Senha fraca ou email em uso.');
          console.error(error);
        }
        setCarregando(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white/5 backdrop-blur-md border border-white/10 p-8 rounded-2xl w-full max-w-md">
            <h1 className="text-4xl font-light tracking-wider text-center mb-6">Ace<span className="text-optic-yellow font-bold">Mind</span></h1>
            
            <div className="flex justify-between mb-8 border-b border-white/10 pb-2">
              <button onClick={() => setModo('login')} className={`flex-1 text-center pb-2 ${modo === 'login' ? 'text-optic-yellow border-b-2 border-optic-yellow font-bold' : 'text-slate-500'}`}>Entrar</button>
              <button onClick={() => setModo('cadastro')} className={`flex-1 text-center pb-2 ${modo === 'cadastro' ? 'text-optic-yellow border-b-2 border-optic-yellow font-bold' : 'text-slate-500'}`}>Criar Conta</button>
            </div>

            {erro && <p className="text-red-500 text-sm mb-4 text-center">{erro}</p>}
            
            <form onSubmit={processarAuth} className="space-y-4">
              <div>
                <label className="text-slate-400 text-sm">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-optic-yellow" required />
              </div>
              
              <div>
                <label className="text-slate-400 text-sm">Senha</label>
                <input type="password" value={senha} onChange={e => setSenha(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-optic-yellow" required />
              </div>

              {modo === 'cadastro' && (
                <div>
                  <label className="text-slate-400 text-sm">Nível de Acesso (Cargo)</label>
                  <select value={cargo} onChange={e => setCargo(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg p-3 text-white mt-1 outline-none focus:border-optic-yellow">
                    <option value="paciente">Atleta / Paciente</option>
                    <option value="psicologo">Psicólogo</option>
                    <option value="admin">Gestor Geral (Admin)</option>
                  </select>
                </div>
              )}

              <button type="submit" disabled={carregando} className="w-full bg-optic-yellow text-slate-950 font-bold py-3 rounded-lg hover:bg-[#b3e600] transition mt-6 disabled:opacity-50">
                {carregando ? 'Processando...' : modo === 'login' ? 'Acessar Sistema' : 'Cadastrar'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // TELA 2: APP DO PACIENTE
    // --------------------------------------------------
    const MobileApp = ({ usuarioAtual }) => {
      const [foco, setFoco] = useState(5);
      const [energia, setEnergia] = useState(5);

      const salvarCheckin = async () => {
        try {
          await window.fbAPI.addDoc(window.fbAPI.collection(window.db, "checkins"), {
            pacienteId: usuarioAtual.uid, email: usuarioAtual.email, foco: parseInt(foco), energia: parseInt(energia), data: new Date().toISOString()
          });
          alert("Check-in enviado com sucesso!");
          setFoco(5); setEnergia(5);
        } catch (error) { alert("Erro ao salvar."); }
      };

      return (
        <div className="flex items-center justify-center min-h-[90vh] p-4 bg-black/90">
          <div className="w-full max-w-[375px] h-[700px] bg-slate-950 rounded-[2.5rem] border-[6px] border-slate-800 overflow-hidden relative shadow-2xl flex flex-col">
            <div className="pt-12 pb-6 px-6 bg-gradient-to-b from-optic-yellow/10 to-transparent">
              <h2 className="text-xl text-white font-light truncate">Olá, {usuarioAtual.email.split('@')[0]}</h2>
              <p className="text-slate-400 text-sm mt-1">Sua área exclusiva de check-in.</p>
            </div>
            <div className="flex-1 overflow-y-auto px-6 pb-24 space-y-6">
              <div className="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-5">
                <h3 className="text-white font-medium mb-4">Diário de Bordo</h3>
                <div className="space-y-6">
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Desfocado</span><span>Foco Total</span></div>
                    <input type="range" min="1" max="10" value={foco} onChange={(e) => setFoco(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none accent-[#ccff00]" />
                  </div>
                  <div>
                    <div className="flex justify-between text-xs text-slate-400 mb-2"><span>Exausto</span><span>Energizado</span></div>
                    <input type="range" min="1" max="10" value={energia} onChange={(e) => setEnergia(e.target.value)} className="w-full h-2 bg-slate-800 rounded-lg appearance-none accent-[#ccff00]" />
                  </div>
                  <button onClick={salvarCheckin} className="w-full bg-optic-yellow text-slate-950 font-medium py-3 rounded-xl hover:bg-[#b3e600]">Enviar Registro</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // TELA 3: PAINEL DO PSICÓLOGO
    // --------------------------------------------------
    const DashboardPsicologo = () => {
      const [checkins, setCheckins] = useState([]);

      useEffect(() => {
        const buscarDados = async () => {
          const q = window.fbAPI.query(window.fbAPI.collection(window.db, "checkins"), window.fbAPI.orderBy("data", "desc"), window.fbAPI.limit(10));
          const querySnapshot = await window.fbAPI.getDocs(q);
          setCheckins(querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), dataFormatada: new Date(doc.data().data).toLocaleDateString('pt-BR') })));
        };
        buscarDados();
      }, []);

      return (
        <div className="p-8">
          <h2 className="text-2xl font-light mb-6 border-b border-white/10 pb-4">Visão Clínica: Diários dos Pacientes</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {checkins.map(reg => (
              <div key={reg.id} className="bg-white/5 border border-white/10 p-6 rounded-2xl">
                <h3 className="text-optic-yellow font-bold truncate">{reg.email}</h3>
                <p className="text-xs text-slate-400 mb-4">{reg.dataFormatada}</p>
                <p>Foco: <span className="text-white font-bold">{reg.foco}/10</span></p>
                <p>Energia: <span className="text-white font-bold">{reg.energia}/10</span></p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // TELA 4: PAINEL DO GESTOR (ADMIN) - VÊ TUDO
    // --------------------------------------------------
    const DashboardAdmin = () => {
      const [usuarios, setUsuarios] = useState([]);
      const [checkins, setCheckins] = useState([]);

      useEffect(() => {
        const buscarTudo = async () => {
          // Busca todos os usuários cadastrados
          const userSnap = await window.fbAPI.getDocs(window.fbAPI.collection(window.db, "usuarios"));
          setUsuarios(userSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          
          // Busca todos os checkins do sistema
          const checkinSnap = await window.fbAPI.getDocs(window.fbAPI.query(window.fbAPI.collection(window.db, "checkins"), window.fbAPI.orderBy("data", "desc"), window.fbAPI.limit(20)));
          setCheckins(checkinSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        };
        buscarTudo();
      }, []);

      return (
        <div className="p-8">
          <h2 className="text-3xl text-optic-yellow font-bold mb-8">Painel do Gestor (Visão Global)</h2>
          
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            {/* Bloco 1: Gestão de Usuários */}
            <div className="bg-slate-900 border border-white/10 p-6 rounded-2xl">
              <h3 className="text-xl font-light mb-4">Todos os Usuários Cadastrados ({usuarios.length})</h3>
              <ul className="space-y-3">
                {usuarios.map(u => (
                  <li key={u.id} className="flex justify-between items-center bg-black/50 p-3 rounded">
                    <span>{u.email}</span>
                    <span className={`text-xs px-2 py-1 rounded font-bold uppercase ${u.cargo === 'admin' ? 'bg-red-500/20 text-red-400' : u.cargo === 'psicologo' ? 'bg-blue-500/20 text-blue-400' : 'bg-green-500/20 text-green-400'}`}>
                      {u.cargo}
                    </span>
                  </li>
                ))}
              </ul>
            </div>

            {/* Bloco 2: Últimos Movimentos (Checkins) */}
            <div className="bg-slate-900 border border-white/10 p-6 rounded-2xl">
              <h3 className="text-xl font-light mb-4">Fluxo Global de Check-ins</h3>
              <div className="space-y-3">
                {checkins.map(reg => (
                  <div key={reg.id} className="bg-black/50 p-3 rounded flex justify-between">
                    <div>
                      <p className="text-sm font-bold text-optic-yellow">{reg.email}</p>
                      <p className="text-xs text-slate-400">Data: {new Date(reg.data).toLocaleString('pt-BR')}</p>
                    </div>
                    <div className="text-right text-sm">
                      <p>Foco: {reg.foco}</p>
                      <p>Eng: {reg.energia}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // CONTROLADOR PRINCIPAL DO SISTEMA
    // --------------------------------------------------
    const App = () => {
      const [usuarioLogado, setUsuarioLogado] = useState(null);
      const [carregandoSistema, setCarregandoSistema] = useState(true);

      useEffect(() => {
        setTimeout(() => {
          if (window.auth) {
            window.fbAPI.onAuthStateChanged(window.auth, async (user) => {
              if (user) {
                // Ao carregar a página, verifica no banco qual o cargo do cara
                const userDoc = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", user.uid));
                const cargoBanco = userDoc.exists() ? userDoc.data().cargo : 'paciente';
                setUsuarioLogado({ ...user, cargo: cargoBanco });
              } else {
                setUsuarioLogado(null);
              }
              setCarregandoSistema(false);
            });
          } else {
            setCarregandoSistema(false);
          }
        }, 1000);
      }, []);

      const fazerLogout = () => {
        window.fbAPI.signOut(window.auth);
        setUsuarioLogado(null);
      };

      if (carregandoSistema) return <div className="min-h-screen flex items-center justify-center text-optic-yellow">Iniciando Servidor Seguro...</div>;
      if (!usuarioLogado) return <TelaAutenticacao setUsuarioLogado={setUsuarioLogado} />;

      return (
        <div>
          {/* BARRA DE NAVEGAÇÃO DE TOPO */}
          <div className="bg-slate-900 p-4 flex justify-between items-center border-b border-white/10 text-sm">
            <div className="flex items-center gap-4">
              <span className="font-bold text-lg tracking-widest text-white">Ace<span className="text-optic-yellow">Mind</span></span>
              <span className={`px-2 py-1 rounded text-xs font-bold uppercase ${usuarioLogado.cargo === 'admin' ? 'bg-red-500/20 text-red-400' : usuarioLogado.cargo === 'psicologo' ? 'bg-blue-500/20 text-blue-400' : 'bg-green-500/20 text-green-400'}`}>
                Sessão: {usuarioLogado.cargo}
              </span>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-slate-400 hidden sm:block">{usuarioLogado.email}</span>
              <button onClick={fazerLogout} className="text-red-400 hover:bg-red-500 hover:text-white px-3 py-1 rounded border border-red-500/30 transition">Sair</button>
            </div>
          </div>

          {/* ROTEAMENTO: Exibe a tela correta baseada no Cargo */}
          {usuarioLogado.cargo === 'admin' && <DashboardAdmin />}
          {usuarioLogado.cargo === 'psicologo' && <DashboardPsicologo />}
          {usuarioLogado.cargo === 'paciente' && <MobileApp usuarioAtual={usuarioLogado} />}
          
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
