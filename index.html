<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceMind - Psicologia do Tênis</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { 'optic-yellow': '#ccff00' } } } }</script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body { background-color: #020617; color: white; font-family: sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // =========================================================================
    // COLE SUAS CHAVES DO FIREBASE AQUI
    // =========================================================================
    const firebaseConfig = {
    apiKey: "AIzaSyA-Wkrh3xZc-V0snzsjvg4i9ffxWCKyu0M",
  authDomain: "ace-mind-c13a1.firebaseapp.com",
  databaseURL: "https://ace-mind-c13a1-default-rtdb.firebaseio.com",
  projectId: "ace-mind-c13a1",
  storageBucket: "ace-mind-c13a1.firebasestorage.app",
  messagingSenderId: "22508213575",
  appId: "1:22508213575:web:a7a38ac233b893f992e862"
    };

    try {
      const app = initializeApp(firebaseConfig);
      window.db = getFirestore(app);
      window.auth = getAuth(app);
      window.fbAPI = { collection, addDoc, getDocs, query, orderBy, limit, doc, setDoc, getDoc, updateDoc, deleteDoc, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut };
      window.firebasePronto = true;
    } catch (erro) { window.firebaseErro = true; }
  </script>
</head>
<body class="overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Ícones simplificados
    const Icons = {
      Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
      Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>,
      Chart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>,
    };

    // Lógica para definir a cor do Risco baseado nas notas de 1 a 10
    const calcularRisco = (foco, energia) => {
      if (foco <= 4 || energia <= 4) return { cor: 'bg-red-500', texto: 'Risco Alto', border: 'border-red-500/30' };
      if (foco <= 6 || energia <= 6) return { cor: 'bg-yellow-500', texto: 'Atenção', border: 'border-yellow-500/30' };
      return { cor: 'bg-green-500', texto: 'Estável', border: 'border-green-500/30' };
    };

    // --------------------------------------------------
    // 1. VISÃO GERAL (DASHBOARD)
    // --------------------------------------------------
    const ModuloDashboard = ({ checkins }) => (
      <div className="space-y-6">
        <h2 className="text-2xl font-light border-b border-white/10 pb-4">Visão Geral do Sistema</h2>
        <div className="glass-panel p-6 rounded-2xl">
          <h3 className="text-lg font-medium mb-4 flex items-center gap-2">Radares de Atenção Diários</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {checkins.slice(0, 6).map((reg, i) => {
              const risco = calcularRisco(reg.foco, reg.energia);
              return (
                <div key={i} className={`bg-slate-900/80 p-4 rounded-xl border ${risco.border}`}>
                  <div className="flex justify-between items-start mb-2">
                    <span className="font-bold text-white truncate">{reg.email.split('@')[0]}</span>
                    <div className={`w-3 h-3 rounded-full ${risco.cor} shadow-[0_0_8px_currentColor]`}></div>
                  </div>
                  <p className="text-xs text-slate-400 mb-2">{risco.texto}</p>
                  <div className="flex justify-between text-sm">
                    <span>Foco: <strong>{reg.foco}</strong></span>
                    <span>Energia: <strong>{reg.energia}</strong></span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );

    // --------------------------------------------------
    // 2. PRONTUÁRIO ELETRÔNICO (CRUD Completo)
    // --------------------------------------------------
    const ModuloProntuario = () => {
      const [rotinaPre, setRotinaPre] = useState("4 quiques, respiração profunda.");
      const [rotinaPos, setRotinaPos] = useState("Ajustar cordas, olhar para toalha.");
      const [editandoRotina, setEditandoRotina] = useState(false);
      
      const [anotacoes, setAnotacoes] = useState([{ id: 1, data: new Date().toISOString(), texto: "S: Frustração.\nO: Tensão.\nA: Ansiedade.\nP: Reforçar toalha.", editadoEm: null }]);
      const [novaAnotacao, setNovaAnotacao] = useState("");
      const [editandoAnotacaoId, setEditandoAnotacaoId] = useState(null);

      const salvarRotina = () => setEditandoRotina(false);

      const salvarAnotacao = () => {
        if (!novaAnotacao.trim()) return;
        if (editandoAnotacaoId) {
          setAnotacoes(anotacoes.map(a => a.id === editandoAnotacaoId ? { ...a, texto: novaAnotacao, editadoEm: new Date().toISOString() } : a));
          setEditandoAnotacaoId(null);
        } else {
          setAnotacoes([{ id: Date.now(), data: new Date().toISOString(), texto: novaAnotacao, editadoEm: null }, ...anotacoes]);
        }
        setNovaAnotacao("");
      };

      const excluirAnotacao = (id) => setAnotacoes(anotacoes.filter(a => a.id !== id));
      
      const editarAnotacao = (anotacao) => {
        setNovaAnotacao(anotacao.texto);
        setEditandoAnotacaoId(anotacao.id);
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center border-b border-white/10 pb-4">
            <h2 className="text-2xl font-light">Gestão de Atletas</h2>
            <div className="flex gap-2">
              <select className="bg-slate-900 border border-white/20 text-white text-sm rounded-lg p-2">
                <option>Atleta: Carlos Alcaraz</option>
              </select>
              <button className="bg-white/10 hover:bg-white/20 text-white px-3 py-1 rounded text-sm">+ Novo Atleta</button>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div className="space-y-6 xl:col-span-1">
              <div className="glass-panel p-6 rounded-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h4 className="text-sm font-bold text-optic-yellow">Mapeamento de Rotinas</h4>
                  <button onClick={() => editandoRotina ? salvarRotina() : setEditandoRotina(true)} className="text-xs bg-white/10 px-2 py-1 rounded hover:bg-white/20">
                    {editandoRotina ? 'Salvar' : 'Editar'}
                  </button>
                </div>
                <div className="space-y-3 text-sm">
                  <div>
                    <label className="text-xs text-slate-400">Pré-saque</label>
                    {editandoRotina ? <input type="text" value={rotinaPre} onChange={e=>setRotinaPre(e.target.value)} className="w-full bg-slate-900 border border-white/20 rounded p-2 text-white" /> 
                    : <div className="bg-slate-900 p-2 rounded">{rotinaPre}</div>}
                  </div>
                  <div>
                    <label className="text-xs text-slate-400">Pós-erro</label>
                    {editandoRotina ? <input type="text" value={rotinaPos} onChange={e=>setRotinaPos(e.target.value)} className="w-full bg-slate-900 border border-white/20 rounded p-2 text-white" /> 
                    : <div className="bg-slate-900 p-2 rounded">{rotinaPos}</div>}
                  </div>
                </div>
              </div>

              <div className="glass-panel p-6 rounded-2xl">
                <h4 className="font-bold mb-2">Análise de Linguagem Corporal</h4>
                <div className="h-24 bg-slate-900 rounded-lg border-2 border-dashed border-white/20 flex flex-col items-center justify-center text-slate-500 text-sm hover:border-optic-yellow hover:text-optic-yellow cursor-pointer transition">
                  <span>+ Upload de Vídeo (.mp4)</span>
                  <span className="text-[10px] mt-1">(Requer Firebase Storage)</span>
                </div>
              </div>
            </div>

            <div className="xl:col-span-2 glass-panel p-6 rounded-2xl flex flex-col h-[600px]">
              <h4 className="font-bold mb-4">Histórico de Sessões Clínicas (SOAP)</h4>
              
              <div className="bg-slate-900 p-4 rounded-xl mb-6">
                <textarea value={novaAnotacao} onChange={e=>setNovaAnotacao(e.target.value)} placeholder="Digite o SOAP da sessão de hoje..." className="w-full h-24 bg-transparent border-none outline-none resize-none text-sm text-slate-200 custom-scrollbar"></textarea>
                <div className="flex justify-end mt-2">
                  <button onClick={salvarAnotacao} className="bg-optic-yellow text-black px-4 py-2 rounded text-sm font-bold">{editandoAnotacaoId ? 'Atualizar Anotação' : 'Salvar Sessão'}</button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2">
                {anotacoes.map(a => (
                  <div key={a.id} className="bg-slate-900/50 p-4 rounded-xl border border-white/5 relative group">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <span className="text-xs text-optic-yellow font-bold">{new Date(a.data).toLocaleString('pt-BR')}</span>
                        {a.editadoEm && <span className="text-[10px] text-slate-500 ml-2 italic">(Editado em: {new Date(a.editadoEm).toLocaleString('pt-BR')})</span>}
                      </div>
                      <div className="hidden group-hover:flex gap-2">
                        <button onClick={() => editarAnotacao(a)} className="text-xs text-blue-400 hover:underline">Editar</button>
                        <button onClick={() => excluirAnotacao(a.id)} className="text-xs text-red-400 hover:underline">Excluir</button>
                      </div>
                    </div>
                    <p className="text-sm text-slate-300 whitespace-pre-wrap">{a.texto}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // 3. RELATÓRIOS (Geração de PDF)
    // --------------------------------------------------
    const ModuloRelatorios = () => {
      const [objetivos, setObjetivos] = useState("");
      const [treinos, setTreinos] = useState("");

      const gerarPDF = () => {
        const elementoHTML = document.getElementById('relatorio-conteudo');
        const config = {
          margin: 10,
          filename: 'Evolucao_Mental_Atleta.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        window.html2pdf().set(config).from(elementoHTML).save();
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center border-b border-white/10 pb-4">
            <h2 className="text-2xl font-light">Evolução Mental</h2>
            <button onClick={gerarPDF} className="bg-optic-yellow text-black px-4 py-2 rounded font-bold text-sm">Exportar PDF</button>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="glass-panel p-6 rounded-2xl space-y-4">
              <h3 className="font-bold text-optic-yellow">Preenchimento do Relatório</h3>
              <div>
                <label className="text-xs text-slate-400 block mb-1">Registro de Treinos / Curtíssimo Prazo</label>
                <textarea value={treinos} onChange={e=>setTreinos(e.target.value)} className="w-full h-24 bg-slate-900 border border-white/10 rounded p-2 text-sm" placeholder="Resumo do comportamento em quadra..."></textarea>
              </div>
              <div>
                <label className="text-xs text-slate-400 block mb-1">Objetivos a Longo Prazo</label>
                <textarea value={objetivos} onChange={e=>setObjetivos(e.target.value)} className="w-full h-24 bg-slate-900 border border-white/10 rounded p-2 text-sm" placeholder="Metas de resiliência, regulação emocional..."></textarea>
              </div>
            </div>

            {/* Pré-visualização do Relatório (invisível fora do papel, mas formatado pro PDF) */}
            <div className="bg-white text-black p-8 rounded-lg overflow-y-auto h-[500px]" id="relatorio-conteudo">
              <div className="text-center border-b-2 border-black pb-4 mb-6">
                <h1 className="text-3xl font-bold uppercase tracking-widest">Ace<span className="text-gray-400">Mind</span></h1>
                <p className="text-sm text-gray-600">Relatório Oficial de Acompanhamento Esportivo</p>
              </div>
              <h2 className="text-xl font-bold mb-2">Atleta: Carlos Alcaraz</h2>
              <p className="text-sm text-gray-500 mb-6">Data de Emissão: {new Date().toLocaleDateString('pt-BR')}</p>
              
              <div className="mb-6">
                <h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">1. Registro de Treinos (Curto Prazo)</h3>
                <p className="text-sm whitespace-pre-wrap">{treinos || "Nenhum dado preenchido."}</p>
              </div>

              <div className="mb-6">
                <h3 className="text-lg font-bold bg-gray-200 p-2 mb-2">2. Objetivos Finais (Longo Prazo)</h3>
                <p className="text-sm whitespace-pre-wrap">{objetivos || "Nenhum dado preenchido."}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --------------------------------------------------
    // NAVEGAÇÃO DO PSICÓLOGO
    // --------------------------------------------------
    const DashboardPsicologo = () => {
      const [abaAtiva, setAbaAtiva] = useState('prontuario');
      const [checkins, setCheckins] = useState([]);

      useEffect(() => {
        const buscarDados = async () => {
          const q = window.fbAPI.query(window.fbAPI.collection(window.db, "checkins"), window.fbAPI.orderBy("data", "desc"), window.fbAPI.limit(20));
          const querySnapshot = await window.fbAPI.getDocs(q);
          setCheckins(querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        };
        buscarDados();
      }, []);

      const menuItems = [
        { id: 'dashboard', label: 'Visão Geral', icon: Icons.Dashboard },
        { id: 'prontuario', label: 'Prontuário (Atletas)', icon: Icons.Users },
        { id: 'relatorios', label: 'Relatórios (PDF)', icon: Icons.Chart },
      ];

      return (
        <div className="flex h-[calc(100vh-64px)] bg-[#020617]">
          <aside className="w-64 glass-panel border-t-0 border-l-0 border-b-0 flex flex-col py-6 px-4">
            <nav className="flex flex-col gap-2">
              {menuItems.map(item => (
                <button key={item.id} onClick={() => setAbaAtiva(item.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${abaAtiva === item.id ? 'bg-optic-yellow text-black font-bold shadow-[0_0_15px_rgba(204,255,0,0.2)]' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                  <item.icon /><span className="text-sm">{item.label}</span>
                </button>
              ))}
            </nav>
          </aside>
          <main className="flex-1 overflow-y-auto p-8 custom-scrollbar">
            {abaAtiva === 'dashboard' && <ModuloDashboard checkins={checkins} />}
            {abaAtiva === 'prontuario' && <ModuloProntuario />}
            {abaAtiva === 'relatorios' && <ModuloRelatorios />}
          </main>
        </div>
      );
    };

    // --------------------------------------------------
    // BASE DO SISTEMA (Login, Sessão)
    // --------------------------------------------------
    const TelaAutenticacao = ({ setUsuarioLogado }) => {
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const fazerLogin = async (e) => {
        e.preventDefault();
        try {
          const cred = await window.fbAPI.signInWithEmailAndPassword(window.auth, email, senha);
          const docRef = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", cred.user.uid));
          setUsuarioLogado({ ...cred.user, cargo: docRef.exists() ? docRef.data().cargo : 'paciente' });
        } catch (error) { alert("Erro de Login"); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <form onSubmit={fazerLogin} className="glass-panel p-8 rounded-2xl w-full max-w-md space-y-4">
            <h1 className="text-4xl text-center mb-6 font-light">Ace<span className="font-bold text-optic-yellow">Mind</span></h1>
            <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3" required />
            <input type="password" placeholder="Senha" value={senha} onChange={e=>setSenha(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded p-3" required />
            <button type="submit" className="w-full bg-optic-yellow text-black font-bold p-3 rounded">Entrar</button>
          </form>
        </div>
      );
    };

    const App = () => {
      const [usuarioLogado, setUsuarioLogado] = useState(null);
      
      useEffect(() => {
        const chk = setInterval(() => {
          if (window.firebasePronto && window.auth) {
            clearInterval(chk);
            window.fbAPI.onAuthStateChanged(window.auth, async (u) => {
              if (u) {
                try {
                  const d = await window.fbAPI.getDoc(window.fbAPI.doc(window.db, "usuarios", u.uid));
                  setUsuarioLogado({ ...u, cargo: d.exists() ? d.data().cargo : 'paciente' });
                } catch(e) { setUsuarioLogado({...u, cargo: 'paciente'}); }
              } else { setUsuarioLogado(null); }
            });
          }
        }, 100);
      }, []);

      if (!usuarioLogado) return <TelaAutenticacao setUsuarioLogado={setUsuarioLogado} />;

      return (
        <div className="h-screen flex flex-col overflow-hidden">
          <div className="h-16 bg-slate-950 border-b border-white/10 flex justify-between items-center px-6 shrink-0">
            <span className="font-bold text-xl tracking-widest text-white">Ace<span className="text-optic-yellow">Mind</span></span>
            <div className="flex gap-4 items-center">
               <span className="text-xs text-slate-400 bg-white/5 px-2 py-1 rounded uppercase border border-white/10">{usuarioLogado.cargo}</span>
               <button onClick={() => { window.fbAPI.signOut(window.auth); setUsuarioLogado(null); }} className="text-xs text-red-400 hover:text-white">Sair</button>
            </div>
          </div>
          {/* Se for psicólogo/admin mostra o Dashboard, senão mostra apenas um aviso (pois o mobile app foi minimizado para caber o código) */}
          {usuarioLogado.cargo === 'psicologo' || usuarioLogado.cargo === 'admin' ? <DashboardPsicologo /> : <div className="p-8">Logado como paciente. (Visão mobile desativada nesta prévia)</div>}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
